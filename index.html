<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Royale — Sélection de Jeux</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600&display=swap');

        :root {
            --gold: #c9a84c;
            --gold-light: #e8cc7a;
            --bg-dark: #06080f;
            --card-bg: #121620;
            --text: #dde2f5;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Effet d'étoiles en fond */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: var(--gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--gold-light);
            letter-spacing: 2px;
            font-style: italic;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
            margin: 60px 0;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.1), transparent);
            transition: 0.5s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(201, 168, 76, 0.2);
            border-color: var(--gold-light);
            background: #1a1f2e;
        }

        .game-card h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--gold-light);
        }

        .game-card p {
            font-size: 0.8rem;
            margin-top: 10px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        footer {
            margin-bottom: 30px;
            font-size: 0.8rem;
            color: var(--gold);
            opacity: 0.5;
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<header>
    <h1>Arcade Royale</h1>
    <p class="subtitle">L'excellence du divertissement</p>
</header>

<div class="grid-container">
    <a href="Go FISH.html" class="game-card">
        <h2>Go Fish</h2>
        <p>Stratégie & Chance</p>
    </a>

    <a href="blackjack.html" class="game-card">
        <h2>Blackjack</h2>
        <p>Le 21 Victorieux</p>
    </a>

    <a href="2048.html" class="game-card">
        <h2>2048</h2>
        <p>Logique Mathématique</p>
    </a>

    <a href="snake.html" class="game-card">
        <h2>Snake</h2>
        <p>Réflexes Classiques</p>
    </a>

    <a href="puissance4.html" class="game-card">
        <h2>Puissance 4</h2>
        <p>Duel Tactique</p>
    </a>

    <a href="memory.html" class="game-card">
        <h2>Memory</h2>
        <p>Esprit d'Analyse</p>
    </a>

    <a href="tic-tac.html" class="game-card">
        <h2>Tic-Tac-Toe</h2>
        <p>Morpion de Luxe</p>
    </a>
</div>

<footer>
    &copy; 2026 ARCADE ROYALE - ALL RIGHTS RESERVED
</footer>

</body>
</html>
