        this.dealerHand = [];
        this.gameState = 'betting';
        this.message = 'Appuyez sur H pour tirer ou S pour rester';
        this.result = '';
        this.score = 0;
        this.dealInitialCards();
    }
    
    createDeck() {
        this.deck = [];
        for (let suit of this.suits) {
            for (let value of this.values) {
                this.deck.push({suit, value});
            }
        }
    }
    
    shuffleDeck() {
        for (let i = this.deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
        }
    }
    
    dealCard() {
        return this.deck.pop();
    }
    
    getHandValue(hand) {
        let value = 0;
        let aces = 0;
        
        for (let card of hand) {
            if (card.value === 'A') {
                aces++;
                value += 11;
            } else if (['K', 'Q', 'J'].includes(card.value)) {
                value += 10;
            } else {
                value += parseInt(card.value);
            }
        }
        
        while (value > 21 && aces > 0) {
            value -= 10;
            aces--;
        }
        
        return value;
    }
    
    dealInitialCards() {
        this.playerHand.push(this.dealCard());
        this.dealerHand.push(this.dealCard());
        this.playerHand.push(this.dealCard());
        this.dealerHand.push(this.dealCard());
        
        // Vérifier blackjack naturel
        if (this.getHandValue(this.playerHand) === 21) {
            this.gameState = 'dealerTurn';
            this.dealerPlay();
        }
    }
    
    hit() {
        if (this.gameState !== 'playing') return;
        
        this.playerHand.push(this.dealCard());
        const playerValue = this.getHandValue(this.playerHand);
        
        if (playerValue > 21) {
            this.endGame('bust');
        } else if (playerValue === 21) {
            this.stand();
        }
    }
    
    stand() {
        if (this.gameState !== 'playing') return;
        this.gameState = 'dealerTurn';
        this.dealerPlay();
    }
    
    doubleDown() {
        if (this.gameState !== 'playing' || this.playerHand.length !== 2) return;
        this.playerHand.push(this.dealCard());
        if (this.getHandValue(this.playerHand) > 21) {
            this.endGame('bust');
        } else {
            this.stand();
        }
    }
    
    dealerPlay() {
        // Le croupier tire jusqu'à 17
        const dealerInterval = setInterval(() => {
            const dealerValue = this.getHandValue(this.dealerHand);
            
            if (dealerValue < 17) {
                this.dealerHand.push(this.dealCard());
            } else {
                clearInterval(dealerInterval);
                this.determineWinner();
            }
        }, 600);
    }
    
    determineWinner() {
        const playerValue = this.getHandValue(this.playerHand);
        const dealerValue = this.getHandValue(this.dealerHand);
        
        if (dealerValue > 21) {
            this.endGame('dealerBust');
        } else if (playerValue > dealerValue) {
            this.endGame('win');
        } else if (dealerValue > playerValue) {
            this.endGame('lose');
        } else {
            this.endGame('push');
        }
    }
    
    endGame(result) {
        this.gameState = 'ended';
        const playerValue = this.getHandValue(this.playerHand);
        const dealerValue = this.getHandValue(this.dealerHand);
        
        switch(result) {
            case 'bust':
                this.result = '💥 Bust! Vous dépassez 21!';
                this.score = 0;
                break;
            case 'dealerBust':
                this.result = '🎉 Le croupier bust! Vous gagnez!';
                this.score = playerValue * 10;
                break;
            case 'win':
                this.result = `🎉 Vous gagnez! (${playerValue} vs ${dealerValue})`;
                this.score = playerValue * 10;
                break;
            case 'lose':
                this.result = `😢 Le croupier gagne! (${playerValue} vs ${dealerValue})`;
                this.score = 0;
                break;
            case 'push':
                this.result = `🤝 Égalité! (${playerValue} vs ${dealerValue})`;
                this.score = playerValue * 5;
                break;
        }
        
        score = this.score;
        updateScore();
        this.gameOver = true;
    }
    
    update(dt) {
        // Pas de mise à jour continue nécessaire
    }
    
    render() {
        // Fond table verte
        const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, 
                                                   canvas.width/2, canvas.height/2, 400);
        gradient.addColorStop(0, '#166534');
        gradient.addColorStop(1, '#052e16');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Bordure
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 8;
        ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);
        
        // Titres
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('CROUPIER', canvas.width/2, 45);
        ctx.fillText('VOS CARTES', canvas.width/2, 295);
        ctx.textAlign = 'left';
        
        // Cartes du croupier
        const dealerStartX = canvas.width/2 - (this.dealerHand.length * 45);
        for (let i = 0; i < this.dealerHand.length; i++) {
            const hidden = (i === 1 && this.gameState === 'playing');
            this.drawCard(dealerStartX + i * 90, 70, this.dealerHand[i], hidden);
        }
        
        // Valeur du croupier
        if (this.gameState !== 'playing') {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`Total: ${this.getHandValue(this.dealerHand)}`, canvas.width/2, 230);
            ctx.textAlign = 'left';
        }
        
        // Cartes du joueur
        const playerStartX = canvas.width/2 - (this.playerHand.length * 45);
        for (let i = 0; i < this.playerHand.length; i++) {
            this.drawCard(playerStartX + i * 90, 320, this.playerHand[i], false);
        }
        
        // Valeur du joueur
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`Total: ${this.getHandValue(this.playerHand)}`, canvas.width/2, 480);
        ctx.textAlign = 'left';
        
        // Message
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 22px Arial';
        ctx.textAlign = 'center';
        
        if (this.gameState === 'ended') {
            ctx.fillText(this.result, canvas.width/2, 530);
        } else {
            ctx.fillText(this.message, canvas.width/2, 530);
        }
        ctx.textAlign = 'left';
    }
    
    drawCard(x, y, card, hidden) {
        // Fond carte
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.roundRect(x, y, 80, 110, 8);
        ctx.fill();
        
        if (hidden) {
            // Dos de carte
            ctx.fillStyle = '#1e40af';
            ctx.beginPath();
            ctx.roundRect(x + 5, y + 5, 70, 100, 5);
            ctx.fill();
            
            // Pattern
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 1;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.moveTo(x + 5, y + 12 + i * 12);
                ctx.lineTo(x + 75, y + 12 + i * 12);
                ctx.stroke();
            }
        } else {
            // Couleur
            const isRed = card.suit === '♥' || card.suit === '♦';
            ctx.fillStyle = isRed ? '#dc2626' : '#1f2937';
            
            // Valeur en haut à gauche
            ctx.font = 'bold 18px Arial';
            ctx.fillText(card.value, x + 8, y + 22);
            ctx.font = '16px Arial';
            ctx.fillText(card.suit, x + 8, y + 40);
            
            // Symbole central
            ctx.font = '36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(card.suit, x + 40, y + 68);
            ctx.textAlign = 'left';
            
            // Valeur en bas à droite (inversée)
            ctx.save();
            ctx.translate(x + 72, y + 102);
            ctx.rotate(Math.PI);
            ctx.font = 'bold 18px Arial';
            ctx.fillText(card.value, 0, 0);
            ctx.restore();
        }
        
        // Bordure
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, 80, 110, 8);
        ctx.stroke();
    }
    
    handleKey(key, code) {
        if (this.gameState === 'ended') return;
        
        switch(code) {
            case 'KeyH':
            case 'KeyZ': // H pour Hit
                this.hit();
                break;
            case 'KeyS':
            case 'KeyQ': // S pour Stand
                this.stand();
                break;
            case 'KeyD': // D pour Double
                this.doubleDown();
                break;
        }
    }
    
    handleClick(x, y) {
        // Boutons visuels
        if (y > 420 && y < 470) {
            if (x > 180 && x < 280) this.hit();
            if (x > 310 && x < 410) this.stand();
            if (x > 440 && x < 540) this.doubleDown();
        }
    }
}


// ============================================
// JEU 8: PONG - Tennis de Table Classique
// ============================================

class PongGame {
    constructor() {
        this.paddleWidth = 15;
        this.paddleHeight = 100;
        this.ballRadius = 10;
        this.reset();
    }
    
    reset() {
        this.playerY = canvas.height/2 - this.paddleHeight/2;
        this.aiY = canvas.height/2 - this.paddleHeight/2;
        this.ballX = canvas.width/2;
        this.ballY = canvas.height/2;
        this.ballSpeedX = 5 * (Math.random() > 0.5 ? 1 : -1);
        this.ballSpeedY = 3 * (Math.random() > 0.5 ? 1 : -1);
        this.playerScore = 0;
        this.aiScore = 0;
        this.gameOver = false;
        this.winScore = 7;
        this.aiSpeed = 5;
        this.aiErrorMargin = 30; // Marge d'erreur pour ne pas être invincible
        this.maxBallSpeed = 12;
    }
    
    update(dt) {
        if (this.gameOver) return;
        
        // Mouvement balle
        this.ballX += this.ballSpeedX;
        this.ballY += this.ballSpeedY;
        
        // Rebond haut/bas
        if (this.ballY - this.ballRadius <= 0 || this.ballY + this.ballRadius >= canvas.height) {
            this.ballSpeedY *= -1;
            this.ballY = Math.max(this.ballRadius, Math.min(canvas.height - this.ballRadius, this.ballY));
        }
        
        // Collision raquette joueur
        if (this.ballX - this.ballRadius <= 30 + this.paddleWidth &&
            this.ballY >= this.playerY && 
            this.ballY <= this.playerY + this.paddleHeight &&
            this.ballSpeedX < 0) {
            this.ballSpeedX *= -1.05; // Légère accélération
            this.ballSpeedX = Math.min(this.ballSpeedX, this.maxBallSpeed);
            
            // Angle basé sur point d'impact
            const hitPos = (this.ballY - this.playerY) / this.paddleHeight;
            this.ballSpeedY = (hitPos - 0.5) * 10;
            this.ballX = 30 + this.paddleWidth + this.ballRadius;
        }
        
        // Collision raquette IA
        if (this.ballX + this.ballRadius >= canvas.width - 30 - this.paddleWidth &&
            this.ballY >= this.aiY && 
            this.ballY <= this.aiY + this.paddleHeight &&
            this.ballSpeedX > 0) {
            this.ballSpeedX *= -1.05;
            this.ballSpeedX = Math.max(this.ballSpeedX, -this.maxBallSpeed);
            
            const hitPos = (this.ballY - this.aiY) / this.paddleHeight;
            this.ballSpeedY = (hitPos - 0.5) * 10;
            this.ballX = canvas.width - 30 - this.paddleWidth - this.ballRadius;
        }
        
        // Points
        if (this.ballX < 0) {
            this.aiScore++;
            this.resetBall(-1);
        } else if (this.ballX > canvas.width) {
            this.playerScore++;
            this.resetBall(1);
        }
        
        score = this.playerScore;
        updateScore();
        
        // IA - Suit la balle avec erreur
        const aiTargetY = this.ballY + (Math.random() - 0.5) * this.aiErrorMargin;
        const aiCenter = this.aiY + this.paddleHeight / 2;
        
        if (aiCenter < aiTargetY - 10) {
            this.aiY += this.aiSpeed;
        } else if (aiCenter > aiTargetY + 10) {
            this.aiY -= this.aiSpeed;
        }
        
        // Limiter IA dans le canvas
        this.aiY = Math.max(0, Math.min(canvas.height - this.paddleHeight, this.aiY));
        
        // Vérifier victoire
        if (this.playerScore >= this.winScore) {
            this.gameOver = true;
            showOverlay('🎉 Vous gagnez!', this.playerScore);
        } else if (this.aiScore >= this.winScore) {
            this.gameOver = true;
            showOverlay('🤖 IA gagne!', this.aiScore);
        }
    }
    
    resetBall(direction) {
        this.ballX = canvas.width/2;
        this.ballY = canvas.height/2;
        this.ballSpeedX = 5 * direction;
        this.ballSpeedY = 3 * (Math.random() > 0.5 ? 1 : -1);
    }
    
    render() {
        // Fond
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Ligne centrale
        ctx.setLineDash([15, 15]);
        ctx.strokeStyle = '#4a5568';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, 0);
        ctx.lineTo(canvas.width/2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // Raquette joueur
        const playerGrad = ctx.createLinearGradient(30, 0, 30 + this.paddleWidth, 0);
        playerGrad.addColorStop(0, '#4ade80');
        playerGrad.addColorStop(1, '#22c55e');
        ctx.fillStyle = playerGrad;
        ctx.beginPath();
        ctx.roundRect(30, this.playerY, this.paddleWidth, this.paddleHeight, 5);
        ctx.fill();
        
        // Raquette IA
        const aiGrad = ctx.createLinearGradient(canvas.width - 30 - this.paddleWidth, 0, canvas.width - 30, 0);
        aiGrad.addColorStop(0, '#ef4444');
        aiGrad.addColorStop(1, '#dc2626');
        ctx.fillStyle = aiGrad;
        ctx.beginPath();
        ctx.roundRect(canvas.width - 30 - this.paddleWidth, this.aiY, this.paddleWidth, this.paddleHeight, 5);
        ctx.fill();
        
        // Balle
        const ballGrad = ctx.createRadialGradient(this.ballX, this.ballY, 0, this.ballX, this.ballY, this.ballRadius);
        ballGrad.addColorStop(0, '#fff');
        ballGrad.addColorStop(1, '#e94560');
        ctx.fillStyle = ballGrad;
        ctx.beginPath();
        ctx.arc(this.ballX, this.ballY, this.ballRadius, 0, Math.PI * 2);
        ctx.fill();
        
        // Traînée de balle
        ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
        ctx.beginPath();
        ctx.arc(this.ballX - this.ballSpeedX * 2, this.ballY - this.ballSpeedY * 2, this.ballRadius * 0.7, 0, Math.PI * 2);
        ctx.fill();
        
        // Scores
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.playerScore.toString(), canvas.width/4, 90);
        
        ctx.fillStyle = '#ef4444';
        ctx.fillText(this.aiScore.toString(), canvas.width * 3/4, 90);
        ctx.textAlign = 'left';
        
        // Texte "VOUS" / "IA"
        ctx.fillStyle = '#888';
        ctx.font = '18px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('VOUS', canvas.width/4, 130);
        ctx.fillText('IA', canvas.width * 3/4, 130);
        ctx.textAlign = 'left';
    }
    
    handleKey(key, code) {
        const speed = 15;
        switch(code) {
            case 'ArrowUp':
            case 'KeyW':
                this.playerY -= speed;
                break;
            case 'ArrowDown':
            case 'KeyS':
                this.playerY += speed;
                break;
        }
        this.playerY = Math.max(0, Math.min(canvas.height - this.paddleHeight, this.playerY));
    }
    
    handleInput(dir) {
        const speed = 15;
        if (dir === 'up') this.playerY -= speed;
        if (dir === 'down') this.playerY += speed;
        this.playerY = Math.max(0, Math.min(canvas.height - this.paddleHeight, this.playerY));
    }
}


// ============================================
// JEU 9: AIR HOCKEY - Physique Réaliste
// ============================================

class AirHockeyGame {
    constructor() {
        this.tableMargin = 30;
        this.goalWidth = 150;
        this.puckRadius = 20;
        this.paddleRadius = 35;
        this.friction = 0.995;
        this.reset();
    }
    
    reset() {
        this.puck = {
            x: canvas.width/2,
            y: canvas.height/2,
            vx: 0,
            vy: 0
        };
        this.playerPaddle = {
            x: 150,
            y: canvas.height/2,
            vx: 0,
            vy: 0
        };
        this.aiPaddle = {
            x: canvas.width - 150,
            y: canvas.height/2,
            vx: 0,
            vy: 0
        };
        this.playerScore = 0;
        this.aiScore = 0;
        this.gameOver = false;
        this.winScore = 7;
        this.aiSpeed = 8;
        this.aiReactionDelay = 0.1;
        this.lastPuckPos = {x: canvas.width/2, y: canvas.height/2};
    }
    
    update(dt) {
        if (this.gameOver) return;
        
        // Sauvegarder position précédente
        this.lastPuckPos = {x: this.puck.x, y: this.puck.y};
        
        // Physique palet
        this.puck.x += this.puck.vx;
        this.puck.y += this.puck.vy;
        
        // Friction
        this.puck.vx *= this.friction;
        this.puck.vy *= this.friction;
        
        // Rebonds murs (sauf buts)
        const goalTop = (canvas.height - this.goalWidth) / 2;
        const goalBottom = goalTop + this.goalWidth;
        
        // Mur gauche (avec but)
        if (this.puck.x - this.puckRadius < this.tableMargin) {
            if (this.puck.y > goalTop && this.puck.y < goalBottom) {
                // BUT pour l'IA!
                this.aiScore++;
                score = this.playerScore;
                updateScore();
                this.resetPuck(1);
                if (this.aiScore >= this.winScore) {
                    this.gameOver = true;
                    showOverlay('🤖 IA gagne!', this.aiScore);
                }
                return;
            } else {
                this.puck.x = this.tableMargin + this.puckRadius;
                this.puck.vx *= -0.9;
            }
        }
        
        // Mur droit (avec but)
        if (this.puck.x + this.puckRadius > canvas.width - this.tableMargin) {
            if (this.puck.y > goalTop && this.puck.y < goalBottom) {
                // BUT pour le joueur!
                this.playerScore++;
                score = this.playerScore;
                updateScore();
                this.resetPuck(-1);
                if (this.playerScore >= this.winScore) {
                    this.gameOver = true;
                    showOverlay('🎉 Vous gagnez!', this.playerScore);
                }
                return;
            } else {
                this.puck.x = canvas.width - this.tableMargin - this.puckRadius;
                this.puck.vx *= -0.9;
            }
        }
        
        // Murs haut et bas
        if (this.puck.y - this.puckRadius < this.tableMargin) {
            this.puck.y = this.tableMargin + this.puckRadius;
            this.puck.vy *= -0.9;
        }
        if (this.puck.y + this.puckRadius > canvas.height - this.tableMargin) {
            this.puck.y = canvas.height - this.tableMargin - this.puckRadius;
            this.puck.vy *= -0.9;
        }
        
        // Collision paddle joueur
        this.handlePaddleCollision(this.playerPaddle, true);
        
        // Collision paddle IA
        this.handlePaddleCollision(this.aiPaddle, false);
        
        // IA
        this.updateAI(dt);
        
        // Limiter paddles
        this.playerPaddle.x = Math.max(this.tableMargin + this.paddleRadius, 
                          Math.min(canvas.width/2 - this.paddleRadius, this.playerPaddle.x));
        this.playerPaddle.y = Math.max(this.tableMargin + this.paddleRadius, 
                          Math.min(canvas.height - this.tableMargin - this.paddleRadius, this.playerPaddle.y));
        this.aiPaddle.x = Math.max(canvas.width/2 + this.paddleRadius, 
                        Math.min(canvas.width - this.tableMargin - this.paddleRadius, this.aiPaddle.x));
        this.aiPaddle.y = Math.max(this.tableMargin + this.paddleRadius, 
                        Math.min(canvas.height - this.tableMargin - this.paddleRadius, this.aiPaddle.y));
    }
    
    handlePaddleCollision(paddle, isPlayer) {
        const dx = this.puck.x - paddle.x;
        const dy = this.puck.y - paddle.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = this.puckRadius + this.paddleRadius;
        
        if (dist < minDist && dist > 0) {
            // Normaliser
            const nx = dx / dist;
            const ny = dy / dist;
            
            // Séparer
            const overlap = minDist - dist;
            this.puck.x += nx * overlap;
            this.puck.y += ny * overlap;
            
            // Calculer vitesse relative
            const dvx = this.puck.vx - paddle.vx;
            const dvy = this.puck.vy - paddle.vy;
            
            // Vitesse relative le long de la normale
            const dvn = dvx * nx + dvy * ny;
            
            // Ne pas résoudre si les objets s'éloignent
            if (dvn < 0) {
                // Restitution
                const restitution = 1.2;
                this.puck.vx -= (1 + restitution) * dvn * nx;
                this.puck.vy -= (1 + restitution) * dvn * ny;
                
                // Ajouter un peu de vitesse du paddle
                this.puck.vx += paddle.vx * 0.5;
                this.puck.vy += paddle.vy * 0.5;
                
                // Limiter vitesse max
                const maxSpeed = 20;
                const speed = Math.sqrt(this.puck.vx**2 + this.puck.vy**2);
                if (speed > maxSpeed) {
                    this.puck.vx = (this.puck.vx / speed) * maxSpeed;
                    this.puck.vy = (this.puck.vy / speed) * maxSpeed;
                }
            }
        }
    }
    
    updateAI(dt) {
        // Comportement défensif offensif
        let targetX = canvas.width - 150;
        let targetY = canvas.height / 2;
        
        // Si le palet est dans notre moitié, aller vers lui
        if (this.puck.x > canvas.width / 2) {
            targetX = this.puck.x - 40;
            targetY = this.puck.y;
            
            // Si le palet vient vers nous, frapper
            if (this.puck.vx < 0) {
                targetX = this.puck.x - 30;
            }
        } else {
            // Position défensive devant le but
            targetX = canvas.width - 150;
            targetY = canvas.height / 2 + (this.puck.y - canvas.height/2) * 0.3;
        }
        
        // Mouvement vers la cible avec limitation
        const dx = targetX - this.aiPaddle.x;
        const dy = targetY - this.aiPaddle.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > 5) {
            const moveSpeed = Math.min(this.aiSpeed, dist);
            this.aiPaddle.vx = (dx / dist) * moveSpeed;
            this.aiPaddle.vy = (dy / dist) * moveSpeed;
            this.aiPaddle.x += this.aiPaddle.vx;
            this.aiPaddle.y += this.aiPaddle.vy;
        } else {
            this.aiPaddle.vx = 0;
            this.aiPaddle.vy = 0;
        }
    }
    
    resetPuck(direction) {
        this.puck.x = canvas.width/2;
        this.puck.y = canvas.height/2;
        this.puck.vx = 3 * direction;
        this.puck.vy = (Math.random() - 0.5) * 4;
    }
    
    render() {
        // Table
        ctx.fillStyle = '#1e40af';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Bordure
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = this.tableMargin * 2;
        ctx.strokeRect(this.tableMargin, this.tableMargin, 
                       canvas.width - this.tableMargin * 2, 
                       canvas.height - this.tableMargin * 2);
        
        // Ligne médiane
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 3;
        ctx.setLineDash([15, 15]);
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, this.tableMargin);
        ctx.lineTo(canvas.width/2, canvas.height - this.tableMargin);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // Centre
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 60, 0, Math.PI * 2);
        ctx.stroke();
        
        // Buts
        const goalTop = (canvas.height - this.goalWidth) / 2;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, goalTop, this.tableMargin, this.goalWidth);
        ctx.fillRect(canvas.width - this.tableMargin, goalTop, this.tableMargin, this.goalWidth);
        
        // But gauche (joueur)
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(0, goalTop, 8, this.goalWidth);
        
        // But droit (IA)
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(canvas.width - 8, goalTop, 8, this.goalWidth);
        
        // Palet avec ombre
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(this.puck.x + 3, this.puck.y + 3, this.puckRadius, this.puckRadius * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        
        const puckGrad = ctx.createRadialGradient(this.puck.x - 5, this.puck.y - 5, 0, 
                                                  this.puck.x, this.puck.y, this.puckRadius);
        puckGrad.addColorStop(0, '#000');
        puckGrad.addColorStop(1, '#333');
        ctx.fillStyle = puckGrad;
        ctx.beginPath();
        ctx.arc(this.puck.x, this.puck.y, this.puckRadius, 0, Math.PI * 2);
        ctx.fill();
        
        // Reflet palet
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(this.puck.x - 5, this.puck.y - 5, 5, 0, Math.PI * 2);
        ctx.fill();
        
        // Paddle joueur
        this.drawPaddle(this.playerPaddle.x, this.playerPaddle.y, '#4ade80', '#22c55e');
        
        // Paddle IA
        this.drawPaddle(this.aiPaddle.x, this.aiPaddle.y, '#ef4444', '#dc2626');
        
        // Scores
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(this.playerScore.toString(), canvas.width/4, 70);
        
        ctx.fillStyle = '#ef4444';
        ctx.fillText(this.aiScore.toString(), canvas.width * 3/4, 70);
        ctx.textAlign = 'left';
        
        // Labels
        ctx.fillStyle = '#aaa';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('VOUS', canvas.width/4, 95);
        ctx.fillText('IA', canvas.width * 3/4, 95);
        ctx.textAlign = 'left';
    }
    
    drawPaddle(x, y, color1, color2) {
        // Ombre
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(x + 3, y + 3, this.paddleRadius, this.paddleRadius * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Paddle
        const grad = ctx.createRadialGradient(x - 10, y - 10, 0, x, y, this.paddleRadius);
        grad.addColorStop(0, color1);
        grad.addColorStop(1, color2);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, this.paddleRadius, 0, Math.PI * 2);
        ctx.fill();
        
        // Poignée
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.arc(x, y, this.paddleRadius * 0.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Bordure
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y, this.paddleRadius - 2, 0, Math.PI * 2);
        ctx.stroke();
    }
    
    handleKey(key, code) {
        const speed = 12;
        switch(code) {
            case 'ArrowUp':
            case 'KeyW':
                this.playerPaddle.vy = -speed;
                break;
            case 'ArrowDown':
            case 'KeyS':
                this.playerPaddle.vy = speed;
                break;
            case 'ArrowLeft':
            case 'KeyA':
                this.playerPaddle.vx = -speed;
                break;
            case 'ArrowRight':
            case 'KeyD':
                this.playerPaddle.vx = speed;
                break;
        }
    }
    
    handleMouseMove(x, y) {
        // Mouvement fluide vers la souris
        const dx = x - this.playerPaddle.x;
        const dy = y - this.playerPaddle.y;
        this.playerPaddle.vx = dx * 0.3;
        this.playerPaddle.vy = dy * 0.3;
        this.playerPaddle.x += this.playerPaddle.vx;
        this.playerPaddle.y += this.playerPaddle.vy;
    }
    
    handleInput(dir) {
        const speed = 12;
        switch(dir) {
            case 'up': this.playerPaddle.vy = -speed; break;
            case 'down': this.playerPaddle.vy = speed; break;
            case 'left': this.playerPaddle.vx = -speed; break;
            case 'right': this.playerPaddle.vx = speed; break;
        }
    }
}

// Initialisation
console.log('🎮 Arcade Collection chargée! 9 jeux prêts.');
console.log('Utilisez les flèches ou WASD pour jouer.');
</script>
