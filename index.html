<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Royale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 0.9rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .game-card {
            width: 150px;
            height: 180px;
            background: #252542;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s, background 0.3s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: #2d2d50;
            border-color: #6c5ce7;
        }

        .game-image {
            width: 80px;
            height: 80px;
            background: #3a3a60;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 15px;
        }

        .game-name {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Arcade Royale</h1>
            <p>Choisis ton jeu</p>
        </header>

        <div class="games-grid">
            <!-- Go Fish -->
            <a href="Go FISH.html" class="game-card">
                <div class="game-image">🐟</div>
                <span class="game-name">Go Fish</span>
            </a>

            <!-- Blackjack -->
            <a href="blackjack.html" class="game-card">
                <div class="game-image">🃏</div>
                <span class="game-name">Blackjack</span>
            </a>

            <!-- 2048 -->
            <a href="2048.html" class="game-card">
                <div class="game-image">🔢</div>
                <span class="game-name">2048</span>
            </a>

            <!-- Snake -->
            <a href="snake.html" class="game-card">
                <div class="game-image">🐍</div>
                <span class="game-name">Snake</span>
            </a>

            <!-- Puissance 4 -->
            <a href="puissance4.html" class="game-card">
                <div class="game-image">🔴</div>
                <span class="game-name">Puissance 4</span>
            </a>

            <!-- Memory -->
            <a href="memory.html" class="game-card">
                <div class="game-image">🧠</div>
                <span class="game-name">Memory</span>
            </a>

            <!-- Tic-Tac-Toe -->
            <a href="tic-tac.html" class="game-card">
                <div class="game-image">⭕</div>
                <span class="game-name">Tic-Tac-Toe</span>
            </a>
        </div>

        <footer>
            © 2026 ARCADE ROYALE
        </footer>
    </div>
</body>
</html>
