<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(100, 181, 246, 0.2);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #64b5f6;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #64b5f6;
        }

        /* Sections */
        .section {
            display: none;
            padding: 100px 30px 50px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .section.active {
            display: block;
        }

        /* Hero */
        .hero {
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #64b5f6, #ce93d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #64b5f6, #ce93d8);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .game-card {
            background: rgba(20, 20, 40, 0.9);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(100, 181, 246, 0.1);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #64b5f6;
            box-shadow: 0 20px 40px rgba(100, 181, 246, 0.2);
        }

        .game-preview {
            height: 150px;
            background: linear-gradient(135deg, #1a1a3a, #0a0a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .game-info {
            padding: 20px;
        }

        .game-info h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #64b5f6;
        }

        .game-info p {
            font-size: 14px;
            color: #888;
            line-height: 1.4;
        }

        /* Game Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a1a;
            z-index: 2000;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(20, 20, 40, 0.95);
            border-bottom: 1px solid rgba(100, 181, 246, 0.2);
        }

        .modal-title {
            font-size: 22px;
            color: #64b5f6;
        }

        .score-display {
            font-size: 18px;
            color: #ffd54f;
        }

        .modal-buttons button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 16px;
        }

        .modal-buttons button:hover {
            background: rgba(100, 181, 246, 0.3);
        }

        .close-btn:hover {
            background: rgba(244, 143, 177, 0.3) !important;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #050510;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 181, 246, 0.2);
        }

        .instructions {
            padding: 12px 25px;
            background: rgba(20, 20, 40, 0.95);
            text-align: center;
            color: #888;
            font-size: 14px;
            border-top: 1px solid rgba(100, 181, 246, 0.1);
        }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-box {
            background: #1a1a3a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .overlay-box h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #64b5f6;
        }

        .overlay-box p {
            margin-bottom: 25px;
            color: #aaa;
        }

        .overlay-box .final-score {
            font-size: 48px;
            color: #ffd54f;
            margin: 20px 0;
        }

        .overlay-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .overlay-buttons button {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64b5f6, #ce93d8);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Scores Table */
        .scores-table {
            width: 100%;
            max-width: 700px;
            margin: 30px auto;
            border-collapse: collapse;
            background: rgba(20, 20, 40, 0.9);
            border-radius: 10px;
            overflow: hidden;
        }

        .scores-table th,
        .scores-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scores-table th {
            background: rgba(100, 181, 246, 0.1);
            color: #64b5f6;
            font-size: 13px;
            text-transform: uppercase;
        }

        .no-scores {
            text-align: center;
            padding: 60px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="logo">🎮 Arcade Collection</div>
        <div class="nav-links">
            <a onclick="showSection('home')" class="active" id="nav-home">Accueil</a>
            <a onclick="showSection('games')" id="nav-games">Jeux</a>
            <a onclick="showSection('scores')" id="nav-scores">Scores</a>
        </div>
    </nav>

    <!-- SECTION ACCUEIL -->
    <section id="home" class="section active">
        <div class="hero">
            <h1>🎮 Arcade Collection</h1>
            <p>Collection de jeux gratuits - Cliquez sur un jeu pour jouer !</p>
            <button class="btn" onclick="showSection('games')">▶ Jouer maintenant</button>
        </div>
    </section>

    <!-- SECTION JEUX -->
    <section id="games" class="section">
        <h2 style="text-align:center;margin-bottom:10px;color:#64b5f6;">Choisissez votre jeu</h2>
        <p style="text-align:center;color:#888;margin-bottom:30px;">Cliquez sur une carte pour lancer le jeu</p>
        <div class="games-grid" id="gamesGrid"></div>
    </section>

    <!-- SECTION SCORES -->
    <section id="scores" class="section">
        <h2 style="text-align:center;color:#64b5f6;">🏆 Tableau des scores</h2>
        <div id="scoresContainer"></div>
    </section>

    <!-- MODAL JEU -->
    <div class="modal" id="gameModal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">Jeu</span>
            <span class="score-display" id="modalScore">Score: 0</span>
            <div class="modal-buttons">
                <button onclick="togglePause()" title="Pause">⏸</button>
                <button class="close-btn" onclick="closeGame()" title="Fermer">✕</button>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        <div class="instructions" id="instructions"></div>
    </div>

    <!-- OVERLAY PAUSE/GAME OVER -->
    <div class="overlay" id="overlay">
        <div class="overlay-box">
            <h2 id="overlayTitle">Pause</h2>
            <p id="overlayMessage"></p>
            <div class="final-score" id="finalScore"></div>
            <div class="overlay-buttons">
                <button class="btn-primary" id="btnResume" onclick="resumeGame()">Reprendre</button>
                <button class="btn-secondary" id="btnRestart" onclick="restartGame()">Recommencer</button>
                <button class="btn-secondary" onclick="closeGame()">Quitter</button>
            </div>
        </div>
    </div>

<script>
// ============================================================
// ARCADE COLLECTION - VERSION COMPLETE ET FONCTIONNELLE
// ============================================================

// Variables globales
let currentGame = null;
let gameLoopId = null;
let isPaused = false;
let isGameOver = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Liste des jeux disponibles
const GAMES_LIST = [
    { id: 'pong', name: 'Pong', icon: '🏓', desc: 'Le classique tennis contre l\'IA', color: '#64b5f6' },
    { id: 'snake', name: 'Snake', icon: '🐍', desc: 'Mangez les pommes et grandissez', color: '#81c784' },
    { id: 'breakout', name: 'Breakout', icon: '🧱', desc: 'Cassez toutes les briques', color: '#ff7043' },
    { id: 'memory', name: 'Memory', icon: '🃏', desc: 'Trouvez les paires de cartes', color: '#ba68c8' },
    { id: 'racing', name: 'Racing', icon: '🏎️', desc: 'Évitez les voitures, course infinie', color: '#4fc3f7' },
    { id: 'tictactoe', name: 'Morpion', icon: '⭕', desc: 'Tic-Tac-Toe contre l\'IA', color: '#f48fb1' }
];

// ============================================================
// NAVIGATION
// ============================================================

function showSection(sectionId) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    const navLink = document.getElementById('nav-' + sectionId);
    if (navLink) navLink.classList.add('active');

    if (sectionId === 'scores') loadScores();
}

function generateGamesGrid() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    
    GAMES_LIST.forEach(game => {
        const highScore = getHighScore(game.id);
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
            <div class="game-preview">${game.icon}</div>
            <div class="game-info">
                <h3>${game.name}</h3>
                <p>${game.desc}</p>
                <small style="color:#ffd54f">🏆 ${highScore > 0 ? highScore : '-'}</small>
            </div>
        `;
        card.onclick = () => launchGame(game.id);
        grid.appendChild(card);
    });
}

// ============================================================
// LANCEMENT DES JEUX
// ============================================================

function launchGame(gameId) {
    // Initialiser audio au premier clic
    try {
        if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}

    currentGame = gameId;
    isPaused = false;
    isGameOver = false;

    const game = GAMES_LIST.find(g => g.id === gameId);
    document.getElementById('modalTitle').textContent = game.icon + ' ' + game.name;
    document.getElementById('modalScore').textContent = 'Score: 0';
    document.getElementById('gameModal').classList.add('active');
    
    // Instructions
    const instructions = getInstructions(gameId);
    document.getElementById('instructions').innerHTML = instructions;

    // Initialiser le jeu
    initGame(gameId);

    // Démarrer la boucle
    if (gameLoopId) cancelAnimationFrame(gameLoopId);
    gameLoopId = requestAnimationFrame(mainLoop);
}

function closeGame() {
    if (gameLoopId) cancelAnimationFrame(gameLoopId);
    document.getElementById('gameModal').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
    currentGame = null;
    generateGamesGrid();
}

function togglePause() {
    if (isGameOver || !currentGame) return;
    isPaused = !isPaused;
    
    if (isPaused) {
        showOverlay('⏸ Pause', 'Appuyez sur Reprendre pour continuer', '');
        document.getElementById('btnResume').style.display = 'inline-block';
    } else {
        hideOverlay();
    }
}

function resumeGame() {
    isPaused = false;
    hideOverlay();
}

function restartGame() {
    hideOverlay();
    initGame(currentGame);
    isGameOver = false;
    isPaused = false;
}

function showOverlay(title, message, score) {
    document.getElementById('overlayTitle').textContent = title;
    document.getElementById('overlayMessage').textContent = message;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('overlay').classList.add('active');
    
    if (title === '💀 Game Over') {
        document.getElementById('btnResume').style.display = 'none';
    } else {
        document.getElementById('btnResume').style.display = 'inline-block';
    }
}

function hideOverlay() {
    document.getElementById('overlay').classList.remove('active');
}

function endGame(score) {
    isGameOver = true;
    saveScore(currentGame, score);
    showOverlay('💀 Game Over', 'Votre score final:', score);
    playSound('gameover');
}

// ============================================================
// AUDIO
// ============================================================

function playSound(type) {
    if (!window.audioCtx) return;
    try {
        const osc = window.audioCtx.createOscillator();
        const gain = window.audioCtx.createGain();
        osc.connect(gain);
        gain.connect(window.audioCtx.destination);
        
        switch(type) {
            case 'click':
                osc.frequency.value = 800;
                gain.gain.value = 0.1;
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                break;
            case 'success':
                osc.frequency.value = 600;
                gain.gain.value = 0.15;
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                break;
            case 'error':
                osc.frequency.value = 200;
                gain.gain.value = 0.15;
                osc.type = 'square';
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                break;
            case 'gameover':
                osc.frequency.value = 150;
                gain.gain.value = 0.2;
                osc.type = 'sawtooth';
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                break;
        }
    } catch(e) {}
}

// ============================================================
// STOCKAGE SCORES
// ============================================================

function saveScore(game, score) {
    let scores = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
    if (!scores[game]) scores[game] = [];
    scores[game].push({ score: score, date: Date.now() });
    scores[game].sort((a, b) => b.score - a.score);
    scores[game] = scores[game].slice(0, 10);
    localStorage.setItem('arcade_scores', JSON.stringify(scores));
}

function getHighScore(game) {
    let scores = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
    return scores[game] && scores[game][0] ? scores[game][0].score : 0;
}

function loadScores() {
    let scores = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
    const container = document.getElementById('scoresContainer');
    
    let flatScores = [];
    for (let [game, list] of Object.entries(scores)) {
        const info = GAMES_LIST.find(g => g.id === game);
        const name = info ? info.icon + ' ' + info.name : game;
        list.forEach((s, i) => flatScores.push({ rank: i+1, game: name, score: s.score }));
    }
    flatScores.sort((a, b) => b.score - a.score).slice(0, 20);
    
    if (flatScores.length === 0) {
        container.innerHTML = '<div class="no-scores"><h3>🏆 Aucun score</h3><p>Jouez pour établir vos premiers records!</p></div>';
        return;
    }
    
    let html = '<table class="scores-table"><thead><tr><th>#</th><th>Jeu</th><th>Score</th></tr></thead><tbody>';
    flatScores.forEach((s, i) => {
        html += `<tr><td>#${i+1}</td><td>${s.game}</td><td style="color:#ffd54f;font-weight:bold">${s.score}</td></tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
}

function getInstructions(id) {
    const instr = {
        pong: '<strong>🏓 Pong:</strong> Déplacez la souris ou utilisez ← → | Premier à 7 points gagne',
        snake: '<strong>🐍 Snake:</strong> Flèches directionnelles ou ZQSD | Mangez les pommes rouges (+10) et étoiles (+50)',
        breakout: '<strong>🧱 Breakout:</strong> Souris ou ← → | Ne laissez pas tomber la balle',
        memory: '<strong>🃏 Memory:</strong> Cliquez sur les cartes pour trouver les paires',
        racing: '<strong>🏎️ Racing:</strong> ← → changer de voie | Évitez les voitures rouges',
        tictactoe: '<strong>⭕ Morpion:</strong> Cliquez pour placer votre symbole | Alignez 3'
    };
    return instr[id] || '';
}

// ============================================================
// BOUCLE DE JEU PRINCIPALE
// ============================================================

function mainLoop() {
    if (!currentGame) return;
    
    if (!isPaused && !isGameOver) {
        updateGame(currentGame);
        renderGame(currentGame);
        updateScoreDisplay();
    } else if (isPaused) {
        renderGame(currentGame); // Afficher même en pause
    }
    
    gameLoopId = requestAnimationFrame(mainLoop);
}

function updateScoreDisplay() {
    if (window.gameState && window.gameState.score !== undefined) {
        document.getElementById('modalScore').textContent = 'Score: ' + window.gameState.score;
    }
}

// ============================================================
// INPUT GLOBAL
// ============================================================

document.addEventListener('keydown', function(e) {
    if (!currentGame) return;
    
    if (e.key === 'Escape' || e.key === ' ') {
        e.preventDefault();
        togglePause();
        return;
    }
    
    handleKeyDown(currentGame, e.key);
});

document.addEventListener('mousemove', function(e) {
    if (!currentGame || isPaused || isGameOver) return;
    
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    handleMouseMove(currentGame, x, y);
});

canvas.addEventListener('click', function(e) {
    if (!currentGame || isPaused || isGameOver) return;
    
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    
    handleClick(currentGame, x, y);
});

// ============================================================
// ===================== PONG ================================
// ============================================================

function initPong() {
    window.gameState = {
        ballX: 400, ballY: 300, ballVX: 5, ballVY: 3,
        paddle1Y: 250, paddle2Y: 250,
        score1: 0, score2: 0,
        paddleHeight: 90, paddleWidth: 12,
        ballSize: 10
    };
}

function updatePong() {
    const s = window.gameState;
    
    // Mouvement balle
    s.ballX += s.ballVX;
    s.ballY += s.ballVY;
    
    // Rebond haut/bas
    if (s.ballY <= s.ballSize || s.ballY >= 600 - s.ballSize) {
        s.ballVY *= -1;
        playSound('click');
    }
    
    // Rebond raquette gauche (joueur)
    if (s.ballX <= 45 + s.paddleWidth && 
        s.ballY >= s.paddle1Y - s.paddleHeight/2 && 
        s.ballY <= s.paddle1Y + s.paddleHeight/2 &&
        s.ballVX < 0) {
        s.ballVX *= -1.05;
        s.ballVY += (s.ballY - s.paddle1Y) * 0.08;
        s.ballX = 45 + s.paddleWidth + s.ballSize;
        playSound('success');
    }
    
    // Rebond raquette droite (IA)
    if (s.ballX >= 755 - s.paddleWidth - s.ballSize && 
        s.ballY >= s.paddle2Y - s.paddleHeight/2 && 
        s.ballY <= s.paddle2Y + s.paddleHeight/2 &&
        s.ballVX > 0) {
        s.ballVX *= -1.05;
        s.ballVY += (s.ballY - s.paddle2Y) * 0.08;
        s.ballX = 755 - s.paddleWidth - s.ballSize;
    }
    
    // IA suit la balle
    const targetY = s.ballY;
    s.paddle2Y += (targetY - s.paddle2Y) * 0.08;
    s.paddle2Y = Math.max(s.paddleHeight/2, Math.min(600 - s.paddleHeight/2, s.paddle2Y));
    
    // Points
    if (s.ballX < 0) {
        s.score2++;
        resetBall(-1);
        playSound('error');
    }
    if (s.ballX > 800) {
        s.score1++;
        resetBall(1);
        playSound('success');
    }
    
    // Victoire
    if (s.score1 >= 7 || s.score2 >= 7) {
        endGame(Math.max(s.score1, s.score2) * 100);
    }
    
    window.gameState.score = Math.max(s.score1, s.score2) * 100;
}

function resetBall(dir) {
    const s = window.gameState;
    s.ballX = 400;
    s.ballY = 300;
    s.ballVX = 5 * dir;
    s.ballVY = (Math.random() - 0.5) * 6;
}

function renderPong() {
    const s = window.gameState;
    
    // Fond
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 800, 600);
    
    // Ligne centrale
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(400, 0);
    ctx.lineTo(400, 600);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Traînée balle
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(s.ballX - s.ballVX, s.ballY - s.ballVY, s.ballSize, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.globalAlpha = 1;
    
    // Balle
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(s.ballX, s.ballY, s.ballSize, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Raquette joueur
    ctx.shadowColor = '#64b5f6';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#64b5f6';
    roundRect(ctx, 30, s.paddle1Y - s.paddleHeight/2, s.paddleWidth, s.paddleHeight, 6);
    ctx.shadowBlur = 0;
    
    // Raquette IA
    ctx.shadowColor = '#f48fb1';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#f48fb1';
    roundRect(ctx, 755 - s.paddleWidth, s.paddle2Y - s.paddleHeight/2, s.paddleWidth, s.paddleHeight, 6);
    ctx.shadowBlur = 0;
    
    // Scores
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(100,181,246,0.3)';

}

function handleKeyDown_Pong(key) {
    const k = key.toLowerCase();
    if (k === 'arrowup' || k === 'z' || k === 'w') {
        window.gameState.paddle1Y -= 25;
    }
    if (k === 'arrowdown' || k === 's') {
        window.gameState.paddle1Y += 25;
    }
    window.gameState.paddle1Y = Math.max(45, Math.min(555, window.gameState.paddle1Y));
}

function handleMouseMove_Pong(x, y) {
    window.gameState.paddle1Y = y;
}

// ===================== SNAKE ===============================
// ============================================================

function initSnake() {
    window.gameState = {
        snake: [{x:10,y:10},{x:9,y:10},{x:8,y:10}],
        dir: {x:1,y:0},
        nextDir: {x:1,y:0},
        food: {x:15,y:10},
        specialFood: null,
        specialTimer: 0,
        gridSize: 20,
        speed: 8,
        moveTimer: 0,
        score: 0
    };
    placeFood();
}

function placeFood() {
    const s = window.gameState;
    do {
        s.food = {
            x: Math.floor(Math.random() * 38) + 1,
            y: Math.floor(Math.random() * 28) + 1
        };
    } while (s.snake.some(seg => seg.x === s.food.x && seg.y === s.food.y));
}

function updateSnake() {
    const s = window.gameState;
    s.moveTimer++;
    
    if (s.moveTimer >= 60 / s.speed) {
        s.moveTimer = 0;
        s.dir = {...s.nextDir};
        
        const head = {
            x: s.snake[0].x + s.dir.x,
            y: s.snake[0].y + s.dir.y
        };
        
        // Collision mur
        if (head.x < 0 || head.x >= 39 || head.y < 0 || head.y >= 29 ||
            s.snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            endGame(s.score);
            return;
        }
        
        s.snake.unshift(head);
        
        // Manger nourriture normale
        if (head.x === s.food.x && head.y === s.food.y) {
            s.score += 10;
            s.speed = Math.min(s.speed + 0.2, 15);
            placeFood();
            playSound('success');
            
            // Chance nourriture spéciale
            if (Math.random() < 0.2) {
                s.specialFood = {
                    x: Math.floor(Math.random() * 38) + 1,
                    y: Math.floor(Math.random() * 28) + 1
                };
                s.specialTimer = 200;
            }
        } else {
            s.snake.pop();
        }
        
        // Manger spéciale
        if (s.specialFood && head.x === s.specialFood.x && head.y === s.specialFood.y) {
            s.score += 50;
            s.specialFood = null;
            playSound('success');
        }
    }
    
    // Timer spéciale
    if (s.specialFood) {
        s.specialTimer--;
        if (s.specialTimer <= 0) s.specialFood = null;
    }
}

function renderSnake() {
    const s = window.gameState;
    const gs = s.gridSize;
    
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 800, 600);
    
    // Grille subtile
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i <= 39; i++) {
        ctx.beginPath(); ctx.moveTo(i*gs, 0); ctx.lineTo(i*gs, 600); ctx.stroke();
    }
    for (let i = 0; i <= 29; i++) {
        ctx.beginPath(); ctx.moveTo(0, i*gs); ctx.lineTo(780, i*gs); ctx.stroke();
    }
    
    // Nourriture spéciale
    if (s.specialFood) {
        const pulse = 1 + Math.sin(Date.now()/100) * 0.3;
        ctx.shadowColor = '#f48fb1';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#f48fb1';
        ctx.beginPath();
        ctx.arc(s.specialFood.x*gs + gs/2, s.specialFood.y*gs + gs/2, gs/2*pulse, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    // Nourriture normale
    ctx.shadowColor = '#81c784';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#81c784';
    ctx.beginPath();
    ctx.arc(s.food.x*gs + gs/2, s.food.y*gs + gs/2, gs/3, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Serpent
    s.snake.forEach((seg, i) => {
        const x = seg.x * gs + 2;
        const y = seg.y * gs + 2;
        const size = gs - 4;
        
        if (i === 0) {
            // Tête
            ctx.shadowColor = '#64b5f6';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#64b5f6';
            roundRect(ctx, x, y, size, size, 5);
            ctx.shadowBlur = 0;
            
            // Yeux
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(x+size/3, y+size/3, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+size*2/3, y+size*2/3, 3, 0, Math.PI*2); ctx.fill();
        } else {
            // Corps avec dégradé
            const alpha = 1 - (i / s.snake.length) * 0.5;
            ctx.fillStyle = `rgba(79, 195, 247, ${alpha})`;
            roundRect(ctx, x + i*0.5, y + i*0.5, size - i, size - i, 3);
        }
    });
    
    // Score
    ctx.font = 'bold 20px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText('Score: ' + s.score, 15, 30);
    ctx.fillText('Longueur: ' + s.snake.length, 750, 30);
}

function handleKeyDown_Snake(key) {
    const s = window.gameState;
    const k = key.toLowerCase();
    
    if ((k === 'arrowup' || k === 'w' || k === 'z') && s.dir.y !== 1) {
        s.nextDir = {x:0, y:-1};
    }
    if ((k === 'arrowdown' || k === 's') && s.dir.y !== -1) {
        s.nextDir = {x:0, y:1};
    }
    if ((k === 'arrowleft' || k === 'a' || k === 'q') && s.dir.x !== 1) {
        s.nextDir = {x:-1, y:0};
    }
    if ((k === 'arrowright' || k === 'd') && s.dir.x !== -1) {
        s.nextDir = {x:1, y:0};
    }
}

function initBreakout() {
    window.gameState = {
        paddle: {x:350, y:560, w:100, h:15},
        ball: {x:400, y:500, r:8, vx:4, vy:-4},
        bricks: [],
        score: 0,
        lives: 3,
        started: false
    };
    
    // Créer briques
    const colors = ['#ef5350', '#ffa726', '#66bb6a', '#42a5f5', '#ab47bc'];
    for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 10; col++) {
            window.gameState.bricks.push({
                x: col * 76 + 35,
                y: row * 30 + 60,
                w: 70,
                h: 25,
                alive: true,
                color: colors[row]
            });
        }
    }
}

function updateBreakout() {
    const s = window.gameState;
    
    if (!s.started) return;
    
    // Mouvement balle
    s.ball.x += s.ball.vx;
    s.ball.y += s.ball.vy;
    
    // Rebond murs
    if (s.ball.x <= s.ball.r || s.ball.x >= 800 - s.ball.r) s.ball.vx *= -1;
    if (s.ball.y <= s.ball.r) s.ball.vy *= -1;
    
    // Rebond palette
    if (s.ball.y >= s.paddle.y - s.ball.r - s.paddle.h/2 &&
        s.ball.x >= s.paddle.x - s.paddle.w/2 &&
        s.ball.x <= s.paddle.x + s.paddle.w/2 &&
        s.ball.vy > 0) {
        s.ball.vy = -Math.abs(s.ball.vy);
        const hitPos = (s.ball.x - s.paddle.x) / (s.paddle.w/2);
        s.ball.vx = hitPos * 6;
        playSound('click');
    }
    
    // Balle tombe
    if (s.ball.y > 620) {
        s.lives--;
        if (s.lives <= 0) {
            endGame(s.score);
            return;
        }
        resetBallBreakout();
    }
    
    // Collisions briques
    s.bricks.forEach(b => {
        if (b.alive && 
            s.ball.x + s.ball.r > b.x && s.ball.x - s.ball.r < b.x + b.w &&
            s.ball.y + s.ball.r > b.y && s.ball.y - s.ball.r < b.y + b.h) {
            b.alive = false;
            s.score += 10;
            s.ball.vy *= -1;
            playSound('success');
        }
    });
    
    // Victoire
    if (s.bricks.every(b => !b.alive)) {
        s.score += 500;
        initBreakout();
    }
    
    window.gameState.score = s.score;
}

function resetBallBreakout() {
    const s = window.gameState;
    s.ball = {x: s.paddle.x, y: s.paddle.y - 30, r:8, vx: 4*(Math.random()>0.5?1:-1), vy:-4};
    s.started = false;
}

function renderBreakout() {
    const s = window.gameState;
    
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 800, 600);
    
    // Briques
    s.bricks.forEach(b => {
        if (b.alive) {
            ctx.fillStyle = b.color;
            shadow(ctx, b.color, 8);
            roundRect(ctx, b.x, b.y, b.w, b.h, 4);
        }
    });
    ctx.shadowBlur = 0;
    
    // Palette
    ctx.fillStyle = '#64b5f6';
    shadow(ctx, '#64b5f6', 12);
    roundRect(ctx, s.paddle.x - s.paddle.w/2, s.paddle.y - s.paddle.h/2, s.paddle.w, s.paddle.h, 8);
    ctx.shadowBlur = 0;
    
    // Balle
    ctx.fillStyle = '#fff';
    shadow(ctx, '#fff', 15);
    ctx.beginPath();
    ctx.arc(s.ball.x, s.ball.y, s.ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Message démarrage
    if (!s.started) {
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText('Cliquez pour commencer', 400, 300);
    }
    
    // UI
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText('Score: ' + s.score + '   ❤️'.repeat(s.lives), 20, 30);
}

function handleMouseMove_Breakout(x, y) {
    window.gameState.paddle.x = x;
}

function handleClick_Breakout() {
    if (!window.gameState.started) {
        window.gameState.started = true;
    }
}

function initMemory() {
    const emojis = ['🎮','🎲','🎯','🎪','🎨','🎭','🎵','🎬'];
    const pairs = [...emojis, ...emojis];
    
    // Shuffle
    for (let i = pairs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
    }
    
    window.gameState = {
        cards: pairs.map((emoji, i) => ({
            emoji: emoji,
            x: 120 + (i % 4) * 160,
            y: 100 + Math.floor(i / 4) * 130,
            flipped: false,
            matched: false
        })),
        firstCard: null,
        canClick: true,
        moves: 0,
        score: 0,
        found: 0
    };
}

function updateMemory() {}

function renderMemory() {
    const s = window.gameState;
    
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 800, 600);
    
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ce93d8';
    ctx.fillText('🃏 Memory', 400, 50);
    
    s.cards.forEach(card => {
        const size = 120;
        
        if (card.matched) {
            ctx.globalAlpha = 0.5;
            ctx.fillStyle = '#81c784';
            roundRect(ctx, card.x - size/2, card.y - size/2, size, size, 15);
            ctx.globalAlpha = 1;
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(card.emoji, card.x, card.y);
        } else if (card.flipped) {
            ctx.fillStyle = '#fff';
            shadow(ctx, '#fff', 12);
            roundRect(ctx, card.x - size/2, card.y - size/2, size, size, 15);
            ctx.shadowBlur = 0;
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(card.emoji, card.x, card.y);
        } else {
            ctx.fillStyle = 'rgba(100,181,246,0.2)';
            roundRect(ctx, card.x - size/2, card.y - size/2, size, size, 15);
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillText('?', card.x, card.y);
        }
    });
    
    ctx.font = '18px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aaa';
    ctx.fillText(`Coups: ${s.moves}  |  Trouvés: ${s.found}/8`, 400, 570);
    
    if (s.found === 8) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(200, 220, 400, 160);
        ctx.font = 'bold 36px Arial';
        ctx.fillStyle = '#81c784';
        ctx.fillText('🎉 Bravo!', 400, 290);
        ctx.font = '20px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText('Score: ' + s.score, 400, 340);
    }
}

function handleClick_Memory(x, y) {
    const s = window.gameState;
    if (!s.canClick || s.found === 8) return;
    
    const card = s.cards.find(c => 
        !c.matched && !c.flipped && 
        Math.abs(x - c.x) < 60 && Math.abs(y - c.y) < 65
    );
    
    if (card) {
        card.flipped = true;
        playSound('click');
        
        if (!s.firstCard) {
            s.firstCard = card;
        } else {
            s.moves++;
            s.canClick = false;
            
            if (s.firstCard.emoji === card.emoji) {
                // Match!
                setTimeout(() => {
                    s.firstCard.matched = true;
                    card.matched = true;
                    s.found++;
                    s.score += 50;
                    s.canClick = true;
                    s.firstCard = null;
                    
                    if (s.found === 8) {
                        s.score += 200;
                        setTimeout(() => endGame(s.score), 500);
                    }
                    playSound('success');
                }, 400);
            } else {
                // Pas match
                setTimeout(() => {
                    s.firstCard.flipped = false;
                    card.flipped = false;
                    s.canClick = true;
                    s.firstCard = null;
                }, 800);
            }
        }
    }
}

function initRacing() {
    window.gameState = {
        playerLane: 1,
        lanes: [180, 400, 620],
        speed: 6,
        distance: 0,
        obstacles: [],
        coins: [],
        lives: 3,
        score: 0,
        roadOffset: 0
    };
}

function updateRacing() {
    const s = window.gameState;
    
    s.distance += s.speed / 10;
    s.speed = Math.min(s.speed + 0.008, 16);
    s.roadOffset = (s.roadOffset + s.speed) % 50;
    
    // Spawn obstacles
    if (Math.random() < 0.02 * s.speed / 8) {
        const lane = Math.floor(Math.random() * 3);
        s.obstacles.push({
            lane: lane,
            x: s.lanes[lane],
            y: -80,
            type: Math.random() > 0.5 ? 'car' : 'cone'
        });
    }
    
    // Spawn coins
    if (Math.random() < 0.015) {
        const lane = Math.floor(Math.random() * 3);
        s.coins.push({
            lane: lane,
            x: s.lanes[lane],
            y: -50
        });
    }
    
    // Update obstacles
    s.obstacles = s.obstacles.filter(o => {
        o.y += s.speed;
        if (o.y > 650) return false;
        
        // Collision
        if (o.lane === s.playerLane && o.y > 450 && o.y < 550) {
            s.lives--;
            playSound('error');
            if (s.lives <= 0) {
                endGame(Math.floor(s.distance) + s.score);
            }
            return true;
        }
        return false;
    });
    
    // Update coins
    s.coins = s.coins.filter(c => {
        c.y += s.speed;
        if (c.y > 650) return false;
        
        if (c.lane === s.playerLane && c.y > 480 && c.y < 520) {
            s.score += 10;
            playSound('click');
            return false;
        }
        return true;
    });
    
    window.gameState.score = Math.floor(s.distance) + s.score;
}

function renderRacing() {
    const s = window.gameState;
    
    // Ciel
    const grad = ctx.createLinearGradient(0, 0, 0, 600);
    grad.addColorStop(0, '#1a1a3e');
    grad.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 800, 600);
    
    // Route
    ctx.fillStyle = '#16213e';
    ctx.fillRect(100, 0, 600, 600);
    
    // Bordures route
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(0, 550, 800, 50);
    
    // Lignes voie
    ctx.strokeStyle = '#f39c12';
    ctx.lineWidth = 3;
    ctx.setLineDash([30, 30]);
    [290, 510].forEach(x => {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, 600);
        ctx.stroke();
    });
    ctx.setLineDash([]);
    
    // Obstacles
    s.obstacles.forEach(o => {
        if (o.type === 'car') {
            ctx.fillStyle = '#e74c3c';
            shadow(ctx, '#e74c3c', 10);
            roundRect(ctx, o.x - 35, o.y, 70, 55, 8);
        } else {
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.moveTo(o.x, o.y + 50);
            ctx.lineTo(o.x - 20, o.y);
            ctx.lineTo(o.x + 20, o.y);
            ctx.closePath();
            ctx.fill();
        }
    });
    ctx.shadowBlur = 0;
    
    // Coins
    s.coins.forEach(c => {
        ctx.fillStyle = '#ffd700';
        shadow(ctx, '#ffd700', 12);
        ctx.beginPath();
        ctx.arc(c.x, c.y, 15, 0, Math.PI*2);
        ctx.fill();
    });
    ctx.shadowBlur = 0;
    
    // Voiture joueur
    ctx.fillStyle = '#64b5f6';
    shadow(ctx, '#64b5f6', 15);
    roundRect(ctx, s.lanes[s.playerLane] - 35, 480, 70, 50, 10);
    ctx.shadowBlur = 0;
    
    // Conducteur
    ctx.fillStyle = '#ffcc99';
    ctx.beginPath();
    ctx.arc(s.lanes[s.playerLane], 505, 15, 0, Math.PI*2);
    ctx.fill();
    
    // UI
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText(Math.floor(s.distance) + 'm', 20, 30);
    
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd700';
    ctx.fillText(s.score + ' 💰', 780, 30);
    
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aaa';
    ctx.font = '14px Arial';
    ctx.fillText(s.speed.toFixed(1) + ' km/h', 400, 30);
    
    ctx.font = '18px Arial';
    ctx.fillStyle = '#ef5350';
    ctx.fillText('❤️'.repeat(s.lives), 400, 575);
}

function handleKeyDown_Racing(key) {
    if (key === 'ArrowLeft' || key.toLowerCase() === 'a' || key.toLowerCase() === 'q') {
        window.gameState.playerLane = Math.max(0, window.gameState.playerLane - 1);
    }
    if (key === 'ArrowRight' || key.toLowerCase() === 'd') {
        window.gameState.playerLane = Math.min(2, window.gameState.playerLane + 1);
    }
}

function initTicTacToe() {
    window.gameState = {
        board: Array(9).fill(null),
        playerTurn: true,
        winner: null,
        gameOver: false,
        score: 0
    };
}

function updateTicTacToe() {}

function renderTicTacToe() {
    const s = window.gameState;
    
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, 800, 600);
    
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f48fb1';
    ctx.fillText('⭕ Morpion', 400, 60);
    
    // Grille
    ctx.strokeStyle = 'rgba(100,181,246,0.4)';
    ctx.lineWidth = 4;
    for (let i = 1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(200 + i * 150, 150);
        ctx.lineTo(200 + i * 150, 520);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(200, 150 + i * 185);
        ctx.lineTo(650, 150 + i * 185);
        ctx.stroke();
    }
    
    // Symboles
    s.board.forEach((cell, i) => {
        const col = i % 3;
        const row = Math.floor(i / 3);
        const x = 275 + col * 150;
        const y = 277 + row * 185;
        
        if (cell === 'X') {
            ctx.strokeStyle = '#64b5f6';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            shadow(ctx, '#64b5f6', 15);
            ctx.beginPath();
            ctx.moveTo(x - 40, y - 40);
            ctx.lineTo(x + 40, y + 40);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 40, y - 40);
            ctx.lineTo(x - 40, y + 40);
            ctx.stroke();
            ctx.shadowBlur = 0;
        } else if (cell === 'O') {
            ctx.strokeStyle = '#f48fb1';
            ctx.lineWidth = 8;
            shadow(ctx, '#f48fb1', 15);
            ctx.beginPath();
            ctx.arc(x, y, 45, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    });
    
    // Status
    let msg = '', color = '#fff';
    if (s.winner === 'X') {
        msg = '🎉 Vous avez gagné!';
        color = '#64b5f6';
    } else if (s.winner === 'O') {
        msg = '😔 L\'IA a gagné';
        color = '#f48fb1';
    } else if (s.gameOver) {
        msg = '🤝 Match nul!';
        color = '#81c784';
    } else {
        msg = s.playerTurn ? '👤 Votre tour (X)' : '🤖 Tour IA...';
        color = s.playerTurn ? '#64b5f6' : '#f48fb1';
    }
    
    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = color;
    ctx.fillText(msg, 400, 565);
}

function handleClick_TicTacToe(x, y) {
    const s = window.gameState;
    if (s.gameOver || !s.playerTurn) return;
    
    // Calculer case cliquée
    if (x < 200 || x > 650 || y < 150 || y > 520) return;
    
    const col = Math.floor((x - 200) / 150);
    const row = Math.floor((y - 150) / 185);
    const idx = row * 3 + col;
    
    if (idx < 0 || idx > 8 || s.board[idx]) return;
    
    // Joueur joue
    s.board[idx] = 'X';
    playSound('click');
    
    // Check victoire
    if (checkWinnerTTT('X')) {
        s.winner = 'X';
        s.gameOver = true;
        s.score = 100;
        setTimeout(() => endGame(100), 500);
        return;
    }
    
    // Check match nul
    if (s.board.every(c => c)) {
        s.gameOver = true;
        return;
    }
    
    // Tour IA
    s.playerTurn = false;
    setTimeout(() => aiMoveTTT(), 400);
}

function checkWinnerTTT(player) {
    const b = window.gameState.board;
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    return wins.some(([a,b,c]) => b[a] === player && b[b] === player && b[c] === player);
}

function aiMoveTTT() {
    const s = window.gameState;
    
    // IA simple: essayer de gagner, bloquer, sinon aléatoire
    let move = findBestMoveTTT('O') ?? findBestMoveTTT('X') ?? getRandomMoveTTT();
    
    if (move !== null) {
        s.board[move] = 'O';
        playSound('click');
        
        if (checkWinnerTTT('O')) {
            s.winner = 'O';
            s.gameOver = true;
            return;
        }
        
        if (s.board.every(c => c)) {
            s.gameOver = true;
            return;
        }
    }
    
    s.playerTurn = true;
}

function findBestMoveTTT(player) {
    const b = window.gameState.board;
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    
    for (const [a,b,c] of wins) {
        if ((b[a] === player) + (b[b] === player) + (b[c] === player) === 2) {
            if (!b[a]) return a;
            if (!b[b]) return b;
            if (!b[c]) return c;
        }
    }
    return null;
}

function getRandomMoveTTT() {
    const b = window.gameState.board;
    const available = b.map((v,i) => v === null ? i : -1).filter(i => i >= 0);
    return available.length > 0 ? available[Math.floor(Math.random() * available.length)] : null;
}

// ============================================================
// DISPATCHERS GENERAUX
// ============================================================

function initGame(id) {
    switch(id) {
        case 'pong': initPong(); break;
        case 'snake': initSnake(); break;
        case 'breakout': initBreakout(); break;
        case 'memory': initMemory(); break;
        case 'racing': initRacing(); break;
        case 'tictactoe': initTicTacToe(); break;
    }
}

function updateGame(id) {
    switch(id) {
        case 'pong': updatePong(); break;
        case 'snake': updateSnake(); break;
        case 'breakout': updateBreakout(); break;
        case 'memory': updateMemory(); break;
        case 'racing': updateRacing(); break;
        case 'tictactoe': updateTicTacToe(); break;
    }
}

function renderGame(id) {
    switch(id) {
        case 'pong': renderPong(); break;
        case 'snake': renderSnake(); break;
        case 'breakout': renderBreakout(); break;
        case 'memory': renderMemory(); break;
        case 'racing': renderRacing(); break;
        case 'tictactoe': renderTicTacToe(); break;
    }
}

function handleKeyDown(id, key) {
    switch(id) {
        case 'pong': handleKeyDown_Pong(key); break;
        case 'snake': handleKeyDown_Snake(key); break;
        case 'racing': handleKeyDown_Racing(key); break;
    }
    
    // Redémarrer avec R
    if (key.toLowerCase() === 'r' && isGameOver) {
        restartGame();
    }
}

function handleMouseMove(id, x, y) {
    switch(id) {
        case 'pong': handleMouseMove_Pong(x, y); break;
        case 'breakout': handleMouseMove_Breakout(x, y); break;
    }
}

function handleClick(id, x, y) {
    switch(id) {
        case 'breakout': handleClick_Breakout(); break;
        case 'memory': handleClick_Memory(x, y); break;
        case 'tictactoe': handleClick_TicTacToe(x, y); break;
    }
}

// Utilitaire dessin rectangle arrondi
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
    ctx.fill();
}

function shadow(ctx, color, blur) {
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
}
