<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Arcade</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* LANDING */
#landing {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0f0c29, #000);
}

h1 {
    font-size: 3em;
    text-shadow: 0 0 20px cyan;
}

button {
    padding: 15px 30px;
    margin-top: 20px;
    border: none;
    background: cyan;
    color: black;
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
}

/* MENU */
#menu {
    display: none;
    padding: 20px;
}

.card {
    width: 200px;
    height: 120px;
    background: linear-gradient(45deg, purple, cyan);
    margin: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 15px;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.1);
}

/* BLACKJACK */
#blackjack {
    display: none;
    text-align: center;
}

/* RUNNER */
#runner {
    display: none;
    position: relative;
    height: 400px;
    background: #111;
    overflow: hidden;
}

.player {
    width: 50px;
    height: 50px;
    background: cyan;
    position: absolute;
    bottom: 10px;
    left: 150px;
}

.obstacle {
    width: 50px;
    height: 50px;
    background: red;
    position: absolute;
    bottom: 10px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
    <h1>NEON ARCADE</h1>
    <button onclick="enterSite()">Entrer</button>
</div>

<!-- MENU -->
<div id="menu">
    <h2>Choisis ton jeu</h2>
    <div class="card" onclick="startBlackjack()">Blackjack</div>
    <div class="card" onclick="startRunner()">Runner</div>
</div>

<!-- BLACKJACK -->
<div id="blackjack">
    <h2>Blackjack</h2>
    <p id="bj-status"></p>
    <button onclick="hit()">Tirer</button>
    <button onclick="stand()">Rester</button>
    <br><br>
    <button onclick="backMenu()">Retour</button>
</div>

<!-- RUNNER -->
<div id="runner">
    <div class="player" id="player"></div>
</div>

<script>
// NAVIGATION
function enterSite() {
    landing.style.display = "none";
    menu.style.display = "block";
}

function backMenu() {
    blackjack.style.display = "none";
    runner.style.display = "none";
    menu.style.display = "block";
}

// BLACKJACK
let player = 0;
let dealer = 0;

function startBlackjack() {
    menu.style.display = "none";
    blackjack.style.display = "block";
    player = Math.floor(Math.random()*10)+10;
    dealer = Math.floor(Math.random()*10)+10;
    updateBJ();
}

function hit() {
    player += Math.floor(Math.random()*10)+1;
    updateBJ();
}

function stand() {
    while (dealer < 17) {
        dealer += Math.floor(Math.random()*10)+1;
    }
    if (dealer > 21 || player > dealer) {
        bjStatus.innerText = "Tu gagnes !";
    } else {
        bjStatus.innerText = "Perdu...";
    }
}

function updateBJ() {
    bjStatus.innerText = "Toi: " + player + " | Dealer: ?";
}

// RUNNER GAME
let playerPos = 150;
let obstacles = [];

function startRunner() {
    menu.style.display = "none";
    runner.style.display = "block";

    document.addEventListener("keydown", movePlayer);

    setInterval(() => {
        let obs = document.createElement("div");
        obs.classList.add("obstacle");
        obs.style.left = "300px";
        runner.appendChild(obs);
        obstacles.push(obs);
    }, 1500);

    setInterval(updateGame, 50);
}

function movePlayer(e) {
    if (e.key === "ArrowLeft") playerPos -= 50;
    if (e.key === "ArrowRight") playerPos += 50;
    document.getElementById("player").style.left = playerPos + "px";
}

function updateGame() {
    obstacles.forEach((obs, i) => {
        let left = parseInt(obs.style.left);
        obs.style.left = left - 5 + "px";

        if (left < playerPos + 50 && left > playerPos - 50) {
            alert("GAME OVER");
            location.reload();
        }
    });
}
</script>

</body>
</html>
