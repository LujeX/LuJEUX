<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuJEUX - Plateforme Gaming Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVIGATION LATÉRALE -->
    <nav id="sidebar">
        <div class="nav-header">
            <div class="logo-container">
                <i class="fas fa-gamepad logo-icon"></i>
                <span class="logo-text">LuJEUX</span>
            </div>
        </div>

        <ul class="nav-menu">
            <li><a href="#accueil" class="nav-link active" onclick="showSection('menu')"><i class="fas fa-home"></i> Accueil</a></li>
            <li><a href="#arcade" class="nav-link" onclick="filterGames('arcade')"><i class="fas fa-ghost"></i> Arcade</a></li>
            <li><a href="#plateau" class="nav-link" onclick="filterGames('plateau')"><i class="fas fa-chess"></i> Plateau</a></li>
            <li><a href="#reflexe" class="nav-link" onclick="filterGames('reflexe')"><i class="fas fa-bolt"></i> Réflexe</a></li>
            <li><a href="#" class="nav-link" onclick="showAllGames()"><i class="fas fa-th"></i> Tous</a></li>
        </ul>

        <div class="nav-footer">
            <span class="version-tag">v3.0 Pro</span>
        </div>
    </nav>

    <!-- BOUTON MOBILE -->
    <button class="mobile-toggle" id="mobileToggle">
        <i class="fas fa-bars"></i>
    </button>

    <!-- CONTENU PRINCIPAL -->
    <main id="mainContent">
        
        <!-- MENU PRINCIPAL -->
        <section id="menuSection" class="hero-section active">
            <div class="hero-content reveal">
                <div class="hero-badge">Collection Gaming Premium</div>
                <h1 class="hero-title">
                    Bienvenue sur<br>
                    <span class="gradient-text">LuJEUX</span>
                </h1>
                <p class="hero-subtitle">
                    9 mini-jeux optimisés avec IA intelligente.<br>
                    Delta Time • 60 FPS • Sans lag.
                </p>
                
                <div class="hero-buttons">
                    <button class="btn btn-primary" onclick="showAllGames()">
                        <i class="fas fa-gamepad"></i> Voir les Jeux
                    </button>
                    <button class="btn btn-secondary" onclick="playRandomGame()">
                        <i class="fas fa-random"></i> Aléatoire
                    </button>
                </div>

                <div class="hero-stats-row">
                    <div class="mini-stat">
                        <span class="mini-stat-number">9</span>
                        <span class="mini-stat-label">Jeux</span>
                    </div>
                    <div class="mini-stat">
                        <span class="mini-stat-number">60</span>
                        <span class="mini-stat-label">FPS</span>
                    </div>
                    <div class="mini-stat">
                        <span class="mini-stat-number">∞</span>
                        <span class="mini-stat-label">Parties</span>
                    </div>
                </div>
            </div>

            <div class="hero-visual reveal">
                <div class="floating-element elem-1"><i class="fas fa-snake"></i></div>
                <div class="floating-element elem-2"><i class="fas fa-cube"></i></div>
                <div class="floating-element elem-3"><i class="fas fa-circle"></i></div>
            </div>
        </section>

        <!-- GRILLE DES JEUX -->
        <section id="gamesSection" class="section" style="display: none;">
            <div class="section-header reveal">
                <h2 class="section-title">
                    Les 9 Jeux
                    <span class="section-number">01</span>
                </h2>
            </div>

            <div class="games-grid" id="gamesGrid">
                <!-- Généré par JS -->
            </div>
        </section>

    </main>

    <!-- MODAL DU JEU -->
    <div class="modal-overlay" id="gameModal">
        <div class="modal-container">
            <button class="modal-close-btn" onclick="closeGame()">
                <i class="fas fa-times"></i>
            </button>

            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Jeu</h2>
                <div class="modal-score-display">
                    <div class="score-badge">
                        <i class="fas fa-trophy"></i>
                        <span id="gameScore">Score: 0</span>
                    </div>
                    <div class="score-badge" id="levelBadge" style="display: none;">
                        <i class="fas fa-layer-group"></i>
                        <span id="gameLevel">Niveau: 1</span>
                    </div>
                </div>
            </div>

            <div class="modal-body" id="gameContainer">
                <!-- Zone de jeu -->
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="restartGame()">
                    <i class="fas fa-redo"></i> Recommencer
                </button>
                <button class="btn btn-primary" onclick="backToMenu()">
                    <i class="fas fa-home"></i> Menu
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
