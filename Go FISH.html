<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7 Familles des Mers — LuJEUX</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap">
<style>
:root{--bg:#06080f;--gold:#c9a84c;--gold2:#e8cc7a;--goldd:#7a5c1a;--txt:#f5ecd5}
body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Cormorant Garamond',serif;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-family:'Cinzel',serif;font-size:3.2rem;color:var(--gold2);text-shadow:0 0 30px rgba(201,168,76,.6);margin:10px 0}
.container{max-width:620px;width:100%}
.stats{display:flex;justify-content:space-around;background:rgba(201,168,76,.08);padding:12px;border-radius:12px;margin-bottom:20px}
.stat{text-align:center}
.stat-val{font-family:'Cinzel',serif;font-size:2rem;color:var(--gold2)}
.hand{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.card{width:78px;height:110px;background:#0a1f1a;border:3px solid var(--gold);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2.8rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 15px rgba(0,0,0,.6)}
.card:hover{transform:scale(1.08);border-color:var(--gold2)}
.card span{font-size:.85rem;margin-top:6px;color:var(--gold2);font-family:'Cinzel',serif}
#ai-hand{font-size:1.8rem;color:var(--goldd);margin:10px 0}
#message{background:rgba(0,0,0,.5);padding:14px 20px;border-radius:12px;text-align:center;min-height:56px;margin:15px 0;font-size:1.1rem}
button{padding:12px 28px;background:linear-gradient(var(--gold2),var(--gold));border:none;border-radius:8px;color:#1a1408;font-family:'Cinzel',serif;font-size:1rem;cursor:pointer}
#ask-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:15px 0}
.ask-btn{background:rgba(201,168,76,.15);border:2px solid var(--gold);color:var(--gold2);padding:8px 16px;border-radius:20px;cursor:pointer;font-family:'Cinzel',serif}
.ask-btn:hover{background:var(--gold);color:#1a1408}
#draw-pile{text-align:center;margin:20px 0}
#draw-pile .pile{font-size:4rem;cursor:pointer}
</style>
</head>
<body>

<h1>7 Familles des Mers</h1>
<div class="container">

  <div class="stats">
    <div class="stat"><div class="stat-val" id="player-books">0</div><div>Tes familles</div></div>
    <div class="stat"><div class="stat-val" id="ai-books">0</div><div>IA</div></div>
    <div class="stat"><div class="stat-val" id="deck-count">18</div><div>Pioche</div></div>
  </div>

  <div id="ai-hand">IA a <span id="ai-count">5</span> cartes 🐟</div>

  <div class="hand" id="player-hand"></div>

  <div id="message">À ton tour ! Clique sur une carte puis demande à l’IA</div>

  <div id="ask-buttons"></div>

  <div id="draw-pile">
    <div class="pile" onclick="drawCard()">🐟<br><small>Pêcher</small></div>
  </div>

  <button onclick="resetGame()">Nouvelle partie</button>
</div>

<script>
// === FAMILLES (7 familles de poissons, 4 cartes chacune) ===
const families = [
  {id:"clown", name:"Poisson-Clown", emoji:"🐠"},
  {id:"requin", name:"Requin", emoji:"🦈"},
  {id:"tortue", name:"Tortue", emoji:"🐢"},
  {id:"pieuvre", name:"Pieuvre", emoji:"🐙"},
  {id:"meduse", name:"Méduse", emoji:"🪼"},
  {id:"etoile", name:"Étoile", emoji:"⭐"},
  {id:"dauphin", name:"Dauphin", emoji:"🐬"}
];

let deck = [];
let playerHand = [];
let aiHand = [];
let playerBooks = 0;
let aiBooks = 0;
let gameOver = false;

function createDeck() {
  deck = [];
  families.forEach(f => {
    for(let i=0; i<4; i++) deck.push(f.id);
  });
  // Shuffle
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
}

function deal() {
  playerHand = deck.splice(0,5);
  aiHand = deck.splice(0,5);
}

function countFamily(hand, fam) {
  return hand.filter(c => c === fam).length;
}

function removeFamily(hand, fam) {
  return hand.filter(c => c !== fam);
}

function checkBooks(hand, isPlayer) {
  let changed = false;
  families.forEach(f => {
    if(countFamily(hand, f.id) === 4) {
      if(isPlayer) playerBooks++;
      else aiBooks++;
      hand = removeFamily(hand, f.id);
      changed = true;
    }
  });
  return hand;
}

function renderPlayerHand() {
  const container = document.getElementById('player-hand');
  container.innerHTML = '';
  playerHand.forEach((cardId, index) => {
    const fam = families.find(f => f.id === cardId);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `${fam.emoji}<span>${fam.name}</span>`;
    div.onclick = () => selectFamily(cardId);
    container.appendChild(div);
  });
}

function updateUI() {
  document.getElementById('player-books').textContent = playerBooks;
  document.getElementById('ai-books').textContent = aiBooks;
  document.getElementById('ai-count').textContent = aiHand.length;
  document.getElementById('deck-count').textContent = deck.length;
  renderPlayerHand();
}

let selectedFamily = null;

function selectFamily(famId) {
  if(gameOver) return;
  selectedFamily = famId;
  const fam = families.find(f => f.id === famId);
  document.getElementById('message').innerHTML = `Tu veux demander : <strong>${fam.emoji} ${fam.name}</strong> ?`;
  
  const btns = document.getElementById('ask-buttons');
  btns.innerHTML = `<button class="ask-btn" onclick="askAI()">Demander à l’IA →</button>`;
}

function askAI() {
  if(!selectedFamily || gameOver) return;
  const fam = selectedFamily;
  selectedFamily = null;
  document.getElementById('ask-buttons').innerHTML = '';

  const aiHas = countFamily(aiHand, fam);
  if(aiHas > 0) {
    // IA donne toutes ses cartes
    for(let i=0; i<aiHas; i++) playerHand.push(fam);
    aiHand = removeFamily(aiHand, fam);
    document.getElementById('message').innerHTML = `L’IA te donne ses ${aiHas} ${families.find(f=>f.id===fam).emoji} !`;
  } else {
    document.getElementById('message').innerHTML = `L’IA n’a pas de ${families.find(f=>f.id===fam).emoji}… Pêche !`;
    if(deck.length > 0) {
      playerHand.push(deck.pop());
    }
  }

  // Vérifier familles complètes
  playerHand = checkBooks(playerHand, true);
  updateUI();

  if(deck.length === 0 && playerHand.length === 0) endGame();
  else setTimeout(aiTurn, 1200);
}

function aiTurn() {
  if(gameOver || aiHand.length === 0) return;

  // IA choisit une famille au hasard qu’elle possède
  const possible = [...new Set(aiHand)];
  const randomFam = possible[Math.floor(Math.random()*possible.length)];

  const playerHas = countFamily(playerHand, randomFam);
  document.getElementById('message').innerHTML = `L’IA demande des ${families.find(f=>f.id===randomFam).emoji}…`;

  if(playerHas > 0) {
    // Tu donnes
    for(let i=0; i<playerHas; i++) aiHand.push(randomFam);
    playerHand = removeFamily(playerHand, randomFam);
    document.getElementById('message').innerHTML += ` Tu lui donnes tes cartes !`;
  } else {
    document.getElementById('message').innerHTML += ` Tu n’as pas… Elle pêche !`;
    if(deck.length > 0) aiHand.push(deck.pop());
  }

  aiHand = checkBooks(aiHand, false);
  updateUI();

  if(deck.length === 0 && aiHand.length === 0) endGame();
  else {
    document.getElementById('message').innerHTML += `<br>À ton tour !`;
  }
}

function drawCard() {
  if(gameOver || deck.length === 0) return;
  playerHand.push(deck.pop());
  playerHand = checkBooks(playerHand, true);
  updateUI();
  document.getElementById('message').textContent = "Tu as pêché une carte !";
  setTimeout(aiTurn, 800);
}

function endGame() {
  gameOver = true;
  let msg = "";
  if(playerBooks > aiBooks) msg = "🏆 Victoire ! Tu as le plus de familles !";
  else if(aiBooks > playerBooks) msg = "L’IA gagne… Bien joué quand même !";
  else msg = "Égalité parfaite !";
  document.getElementById('message').innerHTML = `<strong>${msg}</strong><br>Familles : Toi ${playerBooks} — IA ${aiBooks}`;
}

function resetGame() {
  createDeck();
  deal();
  playerBooks = 0;
  aiBooks = 0;
  gameOver = false;
  selectedFamily = null;
  document.getElementById('ask-buttons').innerHTML = '';
  updateUI();
  document.getElementById('message').textContent = "À ton tour ! Clique sur une carte puis demande à l’IA";
}

// Lancement
resetGame();
</script>
</body>
</html>
