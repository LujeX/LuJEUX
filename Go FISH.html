<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-select=none">
    <title>Go Fish Royale — Maître Jules</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cormorant+Garamond:wght@600&display=swap');

        :root {
            --gold: #c9a84c; --gold2: #e8cc7a; --bg: #060a16;
            --card-w: 100px; --card-h: 145px;
        }

        body {
            background: var(--bg); color: white; margin: 0; overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
            background-image: radial-gradient(circle at center, #0b1426 0%, #060a16 100%);
        }

        /* HUD */
        header {
            display: flex; justify-content: space-between; padding: 20px;
            background: rgba(0,0,0,0.4); border-bottom: 2px solid var(--gold);
        }
        .stat-box { text-align: center; font-family: 'Cinzel'; color: var(--gold2); }
        .stat-val { font-size: 1.5rem; display: block; color: white; }

        /* Board */
        #game-world { height: calc(100vh - 80px); display: flex; flex-direction: column; justify-content: space-between; padding: 20px; position: relative; }

        .zone { display: flex; flex-direction: column; align-items: center; min-height: 180px; }
        
        /* Cartes Style Plato */
        .hand { display: flex; justify-content: center; gap: -40px; width: 100%; perspective: 1000px; }
        
        .card {
            width: var(--card-w); height: var(--card-h);
            background: #1a2235; border: 2px solid var(--gold); border-radius: 12px;
            margin-left: -50px; position: relative; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        }
        .card:first-child { margin-left: 0; }
        .player-hand .card:hover { transform: translateY(-30px) scale(1.1); z-index: 100; border-color: white; box-shadow: 0 15px 30px rgba(201,168,76,0.4); }

        .card .fish-icon { font-size: 2.5rem; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .card .rank-label { font-family: 'Cinzel'; font-weight: 900; font-size: 1.2rem; color: var(--gold2); }

        /* IA Cards */
        .cpu-card { background: linear-gradient(135deg, #0d1526, #c9a84c22); margin-left: -60px; }
        .cpu-card .content { display: none; }
        .cpu-card::after { content: '◈'; color: var(--gold); font-size: 2rem; opacity: 0.3; }

        /* Pioche & Messages */
        .center-deck { position: relative; display: flex; flex-direction: column; align-items: center; }
        #msg-bubble { 
            background: rgba(201, 168, 76, 0.1); border: 1px solid var(--gold);
            padding: 10px 30px; border-radius: 50px; font-family: 'Cinzel';
            color: var(--gold2); font-size: 1.1rem; margin-bottom: 20px;
            animation: pulse 2s infinite; min-height: 50px; text-align: center;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .draw-pile {
            width: 100px; height: 140px; background: var(--gold); border-radius: 10px;
            border: 4px solid white; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #000; font-weight: 900; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        #win-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-gold { 
            background: var(--gold); border: none; padding: 15px 40px; font-family: 'Cinzel';
            font-weight: 900; cursor: pointer; border-radius: 50px; margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="stat-box">ADVERSAIRE <span id="cpu-score" class="stat-val">0</span></div>
    <div class="stat-box" style="color:white; font-size:1.2rem;">GO FISH ROYALE</div>
    <div class="stat-box">MAÎTRE JULES <span id="p-score" class="stat-val">0</span></div>
</header>

<main id="game-world">
    <div class="zone">
        <div id="cpu-hand" class="hand"></div>
    </div>

    <div class="center-deck">
        <div id="msg-bubble">À vous de jouer, Maître Jules.</div>
        <div class="draw-pile" id="deck-view">?</div>
        <p id="deck-count" style="margin-top:10px; color:var(--gold)">Cartes : 52</p>
    </div>

    <div class="zone">
        <div id="player-hand" class="hand player-hand"></div>
    </div>
</main>

<div id="win-overlay">
    <h1 id="win-txt" style="font-family:Cinzel; color:var(--gold); font-size:4rem;"></h1>
    <button class="btn-gold" onclick="location.reload()">REJOUER</button>
</div>

<script>
const FISH_MAP = {
    'A': '🦈', 'K': '🐳', 'Q': '🐬', 'J': '🐙', '10': '🐡', 
    '9': '🐠', '8': '🐟', '7': '🦐', '6': '🦀', '5': '🐚', 
    '4': '🦑', '3': '🐢', '2': '🦞'
};
const RANKS = Object.keys(FISH_MAP);
let deck = [], pHand = [], cHand = [], pSets = 0, cSets = 0, turn = 'player';

function initGame() {
    deck = [];
    RANKS.forEach(r => { for(let i=0; i<4; i++) deck.push(r); });
    deck.sort(() => Math.random() - 0.5);
    pHand = deck.splice(0, 7);
    cHand = deck.splice(0, 7);
    updateUI();
}

function updateUI() {
    const pArea = document.getElementById('player-hand');
    const cArea = document.getElementById('cpu-hand');
    pArea.innerHTML = ''; cArea.innerHTML = '';

    pHand.sort((a,b) => RANKS.indexOf(b) - RANKS.indexOf(a)).forEach(r => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="rank-label">${r}</div><div class="fish-icon">${FISH_MAP[r]}</div><div class="rank-label">${r}</div>`;
        card.onclick = () => playerAct(r);
        pArea.appendChild(card);
    });

    cHand.forEach(() => {
        const div = document.createElement('div');
        div.className = 'card cpu-card';
        cArea.appendChild(div);
    });

    document.getElementById('p-score').innerText = pSets;
    document.getElementById('cpu-score').innerText = cSets;
    document.getElementById('deck-count').innerText = `RESTANT : ${deck.length}`;
}

async function playerAct(rank) {
    if(turn !== 'player') return;
    say(`Vous demandez : ${FISH_MAP[rank]}...`);
    await sleep(1000);

    if(cHand.includes(rank)) {
        const found = cHand.filter(c => c === rank);
        cHand = cHand.filter(c => c !== rank);
        pHand.push(...found);
        say(`L'IA vous donne ${found.length} carte(s) !`);
        checkSets('player');
    } else {
        say(`L'IA : "GO FISH !" 🌊`);
        await sleep(1000);
        draw('player');
    }
}

async function cpuTurn() {
    if(cHand.length === 0 && deck.length > 0) cHand.push(deck.pop());
    if(cHand.length === 0) return checkEnd();
    
    const target = cHand[Math.floor(Math.random()*cHand.length)];
    say(`L'IA demande : ${FISH_MAP[target]}...`);
    await sleep(1500);

    if(pHand.includes(target)) {
        const found = pHand.filter(c => c === target);
        pHand = pHand.filter(c => c !== target);
        cHand.push(...found);
        say(`Vous donnez ${found.length} carte(s).`);
        checkSets('cpu');
        setTimeout(cpuTurn, 1500);
    } else {
        say(`Vous : "GO FISH !" 🌊`);
        draw('cpu');
    }
}

function draw(who) {
    if(deck.length > 0) {
        const c = deck.pop();
        if(who === 'player') {
            pHand.push(c);
            say(`Vous piochez un ${FISH_MAP[c]}`);
            checkSets('player');
            turn = 'cpu'; setTimeout(cpuTurn, 1500);
        } else {
            cHand.push(c);
            checkSets('cpu');
            turn = 'player'; say("À vous, Maître Jules");
        }
    }
    updateUI();
}

function checkSets(who) {
    let hand = (who === 'player') ? pHand : cHand;
    const counts = {};
    hand.forEach(r => counts[r] = (counts[r]||0) + 1);
    for(let r in counts) {
        if(counts[r] === 4) {
            if(who === 'player') { pHand = pHand.filter(c => c !== r); pSets++; }
            else { cHand = cHand.filter(c => c !== r); cSets++; }
            say(`SET DE ${FISH_MAP[r]} COMPLÉTÉ !`);
        }
    }
    updateUI();
    checkEnd();
}

function checkEnd() {
    if(pSets + cSets === 13) {
        const overlay = document.getElementById('win-overlay');
        const txt = document.getElementById('win-txt');
        overlay.style.display = 'flex';
        txt.innerText = pSets > cSets ? "VICTOIRE ROYALE !" : "IA VICTORIEUSE";
    }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));
function say(t) { document.getElementById('msg-bubble').innerText = t; }

initGame();
</script>
</body>
</html>
