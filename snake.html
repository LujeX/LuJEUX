<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Snake Royale — IA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#040808;--txt:#c8e8d8;--dim:#2a4a3a;--dim2:#3a6a50;
  --s0:#00ff88;--s1:#ff3366;--s2:#3399ff;--s3:#ffcc00;
  --s0d:rgba(0,255,136,;--s1d:rgba(255,51,102,;--s2d:rgba(51,153,255,;--s3d:rgba(255,204,0,;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;padding:14px 12px 26px;min-height:100vh;gap:10px}
.back-btn{align-self:flex-start;font-size:.62rem;letter-spacing:.12em;color:var(--dim2);text-decoration:none;
  border:1px solid rgba(0,255,136,.12);border-radius:20px;padding:4px 12px;transition:all .15s;font-family:'Outfit',sans-serif}
.back-btn:hover{color:var(--s0);border-color:rgba(0,255,136,.35)}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite alternate}
@keyframes tw{from{opacity:.03}to{opacity:.7}}
h1{font-size:2.5rem;font-weight:900;letter-spacing:.05em;z-index:1;
  background:linear-gradient(120deg,var(--s0),#c0ffee 40%,var(--s2) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:.68rem;font-weight:300;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);z-index:1;margin-top:-4px}

/* Scoreboard */
.scoreboard{display:flex;gap:8px;z-index:1;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px}
.sb-card{flex:1;min-width:110px;background:rgba(0,0,0,.5);border-radius:10px;padding:8px 12px;
  border:1px solid rgba(255,255,255,.07);transition:all .3s;text-align:center}
.sb-card.alive{border-color:var(--cc);box-shadow:0 0 16px var(--cg)}
.sb-card.dead{opacity:.38}
.sb-name{font-size:.58rem;text-transform:uppercase;letter-spacing:.16em;font-weight:700;margin-bottom:3px}
.sb-score{font-size:1.6rem;font-weight:900;line-height:1}
.sb-len{font-size:.58rem;opacity:.5;margin-top:1px}
.sb-bar{height:3px;border-radius:2px;margin-top:6px;background:rgba(255,255,255,.08);overflow:hidden}
.sb-fill{height:100%;border-radius:2px;transition:width .4s ease}
.rank-badge{display:inline-block;font-size:.55rem;border-radius:10px;padding:1px 7px;margin-top:3px;font-weight:700}

/* Canvas */
#wrap{position:relative;z-index:1}
canvas{display:block;border-radius:12px}
#ov{position:absolute;inset:0;border-radius:12px;pointer-events:none;display:flex;align-items:center;justify-content:center}
.banner{background:rgba(4,8,8,.92);border-radius:12px;padding:22px 38px;text-align:center;
  border:1px solid rgba(0,255,136,.2);backdrop-filter:blur(12px);animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
.banner h2{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.banner p{font-size:.72rem;opacity:.5;letter-spacing:.1em;text-transform:uppercase}

/* Stats row */
.stats-row{display:flex;gap:16px;z-index:1;font-size:.72rem;color:var(--dim2);align-items:center}
.stat-item{text-align:center}
.stat-n{font-size:1.1rem;font-weight:700;color:var(--txt)}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:1}
button{padding:8px 18px;border:none;border-radius:7px;font-family:'Outfit',sans-serif;font-size:.8rem;
  font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .14s}
.btn-g{background:rgba(0,255,136,.12);color:var(--s0);border:1px solid rgba(0,255,136,.25)}
.btn-g:hover{background:rgba(0,255,136,.22);transform:translateY(-1px)}
.btn-n{background:rgba(255,255,255,.07);color:var(--txt);border:1px solid rgba(255,255,255,.12)}
.btn-n:hover{background:rgba(255,255,255,.14)}
.spd-btn{background:rgba(255,255,255,.04);color:var(--dim2);border:1px solid rgba(255,255,255,.07);font-size:.72rem;padding:6px 12px}
.spd-btn.sel{background:rgba(0,255,136,.1);color:var(--s0);border-color:rgba(0,255,136,.25)}
</style>
</head>
<body>
<a class="back-btn" href="index.html">← Accueil</a>
<div id="stars"></div>
<h1>SNAKE ROYALE</h1>
<p class="sub">Pathfinding A★ · 4 IA en combat</p>

<div class="scoreboard" id="scoreboard"></div>

<div id="wrap"><canvas id="c"></canvas><div id="ov"></div></div>

<div class="stats-row">
  <div class="stat-item"><div class="stat-n" id="roundN">0</div><div>Rounds</div></div>
  <div class="stat-item"><div class="stat-n" id="foodN">0</div><div>Nourritures</div></div>
  <div class="stat-item"><div class="stat-n" id="tickN">0</div><div>Ticks</div></div>
</div>

<div class="controls">
  <button class="btn-g" id="btnPlay" onclick="togglePlay()">▶ Lancer</button>
  <button class="btn-n" onclick="newRound()">Nouveau round</button>
  <span style="color:var(--dim2);font-size:.72rem;align-self:center">Vitesse :</span>
  <button class="spd-btn sel" id="sp0" onclick="setSpd(0)">Lente</button>
  <button class="spd-btn" id="sp1" onclick="setSpd(1)">Normale</button>
  <button class="spd-btn" id="sp2" onclick="setSpd(2)">Rapide</button>
  <button class="spd-btn" id="sp3" onclick="setSpd(3)">⚡ Max</button>
</div>

<script>
(()=>{const s=document.getElementById('stars');for(let i=0;i<80;i++){const el=document.createElement('div');el.className='star';const sz=Math.random()<.2?2:1;el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(2+Math.random()*5).toFixed(1)}s`;s.appendChild(el);}})();

const GRID=28,CELL=18,GAP=1,SZ=CELL+GAP;
const W=GRID*SZ+1,H=GRID*SZ+1;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const DPR=window.devicePixelRatio||1;
cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(DPR,DPR);

const SNAKES_CFG=[
  {name:'Émeraude',color:'#00ff88',glow:'rgba(0,255,136,',start:[3,3],dir:[1,0]},
  {name:'Écarlate',color:'#ff3366',glow:'rgba(255,51,102,',start:[GRID-4,3],dir:[-1,0]},
  {name:'Saphir',color:'#3399ff',glow:'rgba(51,153,255,',start:[3,GRID-4],dir:[1,0]},
  {name:'Or',color:'#ffcc00',glow:'rgba(255,204,0,',start:[GRID-4,GRID-4],dir:[-1,0]},
];
const SPEEDS=[220,120,55,18];
let SPD=0,playing=false,gameLoop=null,tick=0,rounds=0,totalFood=0;
let snakes,foods,scores;

// ─── Init ───
function initSnakes(){
  snakes=SNAKES_CFG.map((cfg,i)=>({
    ...cfg,idx:i,
    segs:[[cfg.start[0],cfg.start[1]],[cfg.start[0]-cfg.dir[0],cfg.start[1]-cfg.dir[1]]],
    dir:[...cfg.dir],alive:true,score:0,len:2,kills:0,
  }));
  foods=[];scores=scores||[0,0,0,0];
  for(let i=0;i<4;i++)spawnFood();
}

function spawnFood(){
  const occ=new Set(snakes.flatMap(s=>s.segs.map(([x,y])=>x+','+y)));
  foods.push(freeCell(occ));
}
function freeCell(occ){
  let c;do{c=[0|Math.random()*GRID,0|Math.random()*GRID];}while(occ.has(c[0]+','+c[1])||foods.some(f=>f[0]===c[0]&&f[1]===c[1]));return c;}

// ─── A★ Pathfinding ───
function heur(a,b){return Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1]);}
function astar(start,goal,blocked){
  const key=([x,y])=>x+','+y;
  const open=[{pos:start,g:0,f:heur(start,goal),path:[]}];
  const closed=new Set(blocked);
  while(open.length){
    open.sort((a,b)=>a.f-b.f);
    const cur=open.shift();const ck=key(cur.pos);
    if(closed.has(ck))continue;closed.add(ck);
    if(cur.pos[0]===goal[0]&&cur.pos[1]===goal[1])return cur.path;
    for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){
      const nx=cur.pos[0]+dx,ny=cur.pos[1]+dy;
      if(nx<0||nx>=GRID||ny<0||ny>=GRID)continue;
      const nk=nx+','+ny;if(closed.has(nk))continue;
      const g=cur.g+1;
      open.push({pos:[nx,ny],g,f:g+heur([nx,ny],goal),path:[...cur.path,[dx,dy]]});
    }
  }
  return null;
}

function blocked(exceptIdx=null){
  const s=new Set();
  snakes.forEach((sn,i)=>{if(!sn.alive||(exceptIdx!==null&&i===exceptIdx))return;sn.segs.forEach(([x,y])=>s.add(x+','+y));});
  return s;
}

function aiDir(sn){
  if(!sn.alive)return sn.dir;
  const blk=blocked(sn.idx);
  // Add own body except tail (tail will move)
  sn.segs.slice(0,-1).forEach(([x,y])=>blk.add(x+','+y));
  const head=sn.segs[0];

  // Find closest food
  let bestPath=null,bestFood=null;
  for(const f of foods){
    const path=astar(head,f,new Set(blk));
    if(path&&path.length>0&&(!bestPath||path.length<bestPath.length)){bestPath=path;bestFood=f;}
  }
  if(bestPath&&bestPath.length>0)return bestPath[0];

  // No path to food — survival mode: pick any safe direction
  const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
  for(const d of dirs){
    const nx=head[0]+d[0],ny=head[1]+d[1];
    if(nx<0||nx>=GRID||ny<0||ny>=GRID)continue;
    if(blk.has(nx+','+ny))continue;
    return d;
  }
  return sn.dir;
}

// ─── Step ───
function step(){
  tick++;
  // Move all snakes
  snakes.forEach(sn=>{
    if(!sn.alive)return;
    sn.dir=aiDir(sn);
    const head=[sn.segs[0][0]+sn.dir[0],sn.segs[0][1]+sn.dir[1]];
    sn.segs.unshift(head);

    // Check food
    const fi=foods.findIndex(f=>f[0]===head[0]&&f[1]===head[1]);
    if(fi>=0){sn.len++;sn.score++;scores[sn.idx]++;totalFood++;foods.splice(fi,1);spawnFood();}
    else sn.segs.pop();
  });

  // Collision detection
  const allSegs=new Map();
  snakes.forEach(sn=>{if(!sn.alive)return;sn.segs.forEach(([x,y],i)=>{const k=x+','+y;if(!allSegs.has(k))allSegs.set(k,[]);allSegs.get(k).push({sn,i});});});

  snakes.forEach(sn=>{
    if(!sn.alive)return;
    const[hx,hy]=sn.segs[0];
    // Wall
    if(hx<0||hx>=GRID||hy<0||hy>=GRID){sn.alive=false;return;}
    // Self / other
    const k=hx+','+hy;const occ=allSegs.get(k)||[];
    for(const{sn:other,i}of occ){
      if(other!==sn&&other.alive){sn.alive=false;other.kills=(other.kills||0)+1;break;}
      if(other===sn&&i>0){sn.alive=false;break;}
    }
  });

  // Refeed if starving
  if(foods.length<snakes.filter(s=>s.alive).length+1)spawnFood();

  document.getElementById('tickN').textContent=tick;
  document.getElementById('foodN').textContent=totalFood;
  draw();

  const alive=snakes.filter(s=>s.alive);
  if(alive.length<=1){
    endRound(alive[0]||null);return;
  }
}

function endRound(winner){
  playing=false;clearInterval(gameLoop);gameLoop=null;
  document.getElementById('btnPlay').textContent='▶ Lancer';
  rounds++;document.getElementById('roundN').textContent=rounds;
  const ov=document.getElementById('ov');
  if(winner){
    ov.innerHTML=`<div class="banner"><h2 style="color:${winner.color}">${winner.name} survit !</h2><p>Round ${rounds} · ${winner.len} segments</p></div>`;
  }else{
    ov.innerHTML=`<div class="banner"><h2 style="color:#7ab4c0">Élimination totale !</h2><p>Round ${rounds}</p></div>`;
  }
  ov.style.pointerEvents='auto';ov.onclick=()=>{ov.style.pointerEvents='none';ov.innerHTML='';newRound();};
  updSB();
}

// ─── Draw ───
function draw(){
  ctx.fillStyle='#040808';ctx.fillRect(0,0,W,H);
  // Grid dots
  ctx.fillStyle='rgba(0,255,136,.04)';
  for(let x=0;x<GRID;x++)for(let y=0;y<GRID;y++){ctx.beginPath();ctx.arc(x*SZ+CELL/2,y*SZ+CELL/2,1,0,Math.PI*2);ctx.fill();}

  // Foods
  foods.forEach(([x,y])=>{
    const px=x*SZ,py=y*SZ,cr=CELL/2;
    ctx.shadowColor='rgba(255,100,200,.8)';ctx.shadowBlur=12;
    const g=ctx.createRadialGradient(px+cr*.7,py+cr*.5,cr*.1,px+cr,py+cr,cr*.8);
    g.addColorStop(0,'#ff99ee');g.addColorStop(1,'#cc3388');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(px+cr,py+cr,cr-2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // shine
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(px+cr-.2*cr,py+cr-.28*cr,cr*.28,0,Math.PI*2);ctx.fill();
  });

  // Snakes
  snakes.forEach(sn=>{
    if(!sn.segs.length)return;
    const col=sn.color;const glow=sn.glow;const dead=!sn.alive;
    ctx.globalAlpha=dead?.25:1;
    sn.segs.forEach(([x,y],i)=>{
      const px=x*SZ,py=y*SZ,cr=CELL/2;
      const isHead=i===0,isTail=i===sn.segs.length-1;
      const fade=1-i/sn.segs.length*.6;
      ctx.shadowColor=glow+'.7)';ctx.shadowBlur=isHead?16:6;
      const g=ctx.createRadialGradient(px+cr*.6,py+cr*.45,cr*.1,px+cr,py+cr,cr*.95);
      g.addColorStop(0,lighten(col,isHead?80:20));g.addColorStop(1,col);
      ctx.fillStyle=g;
      const r=isHead?(cr-1):isTail?(cr-3):(cr-2);
      ctx.beginPath();ctx.arc(px+cr,py+cr,r*fade*.6+r*.4,0,Math.PI*2);ctx.fill();
      if(isHead){
        // eyes
        ctx.shadowBlur=0;ctx.fillStyle='#fff';
        const ex1=px+cr+(sn.dir[0]*.4+sn.dir[1]*.3)*cr,ey1=py+cr+(sn.dir[1]*.4-sn.dir[0]*.3)*cr;
        const ex2=px+cr+(sn.dir[0]*.4-sn.dir[1]*.3)*cr,ey2=py+cr+(sn.dir[1]*.4+sn.dir[0]*.3)*cr;
        ctx.beginPath();ctx.arc(ex1,ey1,2.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex2,ey2,2.2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex1+sn.dir[0]*.5,ey1+sn.dir[1]*.5,1,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex2+sn.dir[0]*.5,ey2+sn.dir[1]*.5,1,0,Math.PI*2);ctx.fill();
      }
    });
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  });
}

function lighten(hex,amount){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.min(255,r+amount)},${Math.min(255,g+amount)},${Math.min(255,b+amount)})`;
}

// ─── Scoreboard ───
function updSB(){
  const sb=document.getElementById('scoreboard');sb.innerHTML='';
  const sorted=[...snakes].sort((a,b)=>b.score-a.score);
  sorted.forEach((sn,rank)=>{
    const d=document.createElement('div');d.className='sb-card'+(sn.alive?' alive':' dead');
    if(sn.alive)d.style.setProperty('--cc',sn.color+'40');if(sn.alive)d.style.setProperty('--cg',sn.glow+'.25)');
    const rankTxt=rank===0?'🥇':rank===1?'🥈':rank===2?'🥉':'4e';
    const maxScore=Math.max(...snakes.map(s=>s.score))||1;
    d.innerHTML=`<div class="sb-name" style="color:${sn.color}">${sn.name}</div>
      <div class="sb-score" style="color:${sn.color}">${scores[sn.idx]}</div>
      <div class="sb-len">${sn.len} segments · ${sn.alive?'en vie':'éliminé'}</div>
      <div class="sb-bar"><div class="sb-fill" style="width:${sn.score/maxScore*100}%;background:${sn.color}"></div></div>
      <div><span class="rank-badge" style="background:${sn.color}22;color:${sn.color};border:1px solid ${sn.color}44">${rankTxt}</span></div>`;
    sb.appendChild(d);
  });
}

// ─── Controls ───
function newRound(){
  if(gameLoop)clearInterval(gameLoop);gameLoop=null;playing=false;
  document.getElementById('btnPlay').textContent='▶ Lancer';
  document.getElementById('ov').innerHTML='';document.getElementById('ov').style.pointerEvents='none';
  tick=0;initSnakes();updSB();draw();
}

function togglePlay(){
  if(playing){playing=false;clearInterval(gameLoop);gameLoop=null;document.getElementById('btnPlay').textContent='▶ Reprendre';}
  else{playing=true;document.getElementById('btnPlay').textContent='⏸ Pause';
    if(SPD===3){function fast(){if(!playing)return;step();if(playing)requestAnimationFrame(fast);}requestAnimationFrame(fast);}
    else{gameLoop=setInterval(step,SPEEDS[SPD]);}
  }
}

function setSpd(s){
  SPD=s;document.querySelectorAll('.spd-btn').forEach((b,i)=>b.classList.toggle('sel',i===s));
  if(playing){clearInterval(gameLoop);gameLoop=null;
    if(SPD===3){function fast(){if(!playing)return;step();if(playing)requestAnimationFrame(fast);}requestAnimationFrame(fast);}
    else gameLoop=setInterval(step,SPEEDS[SPD]);
  }
}

// Init
scores=[0,0,0,0];totalFood=0;rounds=0;
initSnakes();updSB();draw();
document.getElementById('roundN').textContent=rounds;
</script>
</body>
</html>
