<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 — LuJEUX</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0a0f0a;
      --grid-bg: #0f1a12;
      --tile-bg-2: #e8d5a3;    --tile-txt-2: #3c2f0f;
      --tile-bg-4: #e8c870;    --tile-txt-4: #3c2f0f;
      --tile-bg-8: #c9a84c;    --tile-txt-8: #1a1408;
      --tile-bg-16: #b8973e;   --tile-txt-16: #fff;
      --tile-bg-32: #a68835;   --tile-txt-32: #fff;
      --tile-bg-64: #8a6820;   --tile-txt-64: #fff;
      --tile-bg-128: #c9a84c;  --tile-txt-128: #000;
      --tile-bg-256: #e8cc7a;  --tile-txt-256: #000;
      --tile-bg-512: #f5e0a0;  --tile-txt-512: #000;
      --tile-bg-1024:#ffd700;  --tile-txt-1024:#000;
      --tile-bg-2048:#ffeb3b;  --tile-txt-2048:#000;
      --gold: #c9a84c;
      --gold2:#e8cc7a;
      --goldd:#8a6820;
      --cream:#f5ecd5;
      --red: #cc2233;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px;
    }
    header {
      text-align: center;
      margin: 16px 0 24px;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: var(--gold2);
      text-shadow: 0 0 30px rgba(201,168,76,0.5);
    }
    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.4em;
      color: var(--goldd);
      margin-top: -8px;
    }
    .stats {
      display: flex;
      gap: 16px;
      margin: 16px 0 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 10px;
      padding: 12px 20px;
      min-width: 110px;
      text-align: center;
    }
    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--goldd);
      text-transform: uppercase;
    }
    .stat-value {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold2);
    }
    #game-container {
      position: relative;
      width: 100%;
      max-width: 460px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background: var(--grid-bg);
      border-radius: 12px;
      padding: 12px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
    }
    .cell {
      aspect-ratio: 1;
      background: rgba(201,168,76,0.06);
      border-radius: 8px;
      position: relative;
    }
    .tile {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 2.4rem;
      transition: all 0.12s ease-out;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .tile.new { animation: pop 0.2s ease-out; }
    @keyframes pop {
      0% { transform: scale(0.0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1.0); }
    }
    .tile.merge { animation: merge 0.18s ease-out; }
    @keyframes merge {
      0%   { transform: scale(1.0); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1.0); }
    }
    /* Couleurs des tuiles */
    .tile-2    { background: var(--tile-bg-2);    color: var(--tile-txt-2); }
    .tile-4    { background: var(--tile-bg-4);    color: var(--tile-txt-4); }
    .tile-8    { background: var(--tile-bg-8);    color: var(--tile-txt-8); }
    .tile-16   { background: var(--tile-bg-16);   color: var(--tile-txt-16); }
    .tile-32   { background: var(--tile-bg-32);   color: var(--tile-txt-32); }
    .tile-64   { background: var(--tile-bg-64);   color: var(--tile-txt-64); }
    .tile-128  { background: var(--tile-bg-128);  color: var(--tile-txt-128); font-size: 2.1rem; }
    .tile-256  { background: var(--tile-bg-256);  color: var(--tile-txt-256); font-size: 2.1rem; }
    .tile-512  { background: var(--tile-bg-512);  color: var(--tile-txt-512); font-size: 2.0rem; }
    .tile-1024 { background: var(--tile-bg-1024); color: var(--tile-txt-1024); font-size: 1.8rem; }
    .tile-2048 { background: var(--tile-bg-2048); color: var(--tile-txt-2048); font-size: 1.8rem; animation: glow 2s infinite alternate; }
    @keyframes glow { from { box-shadow: 0 0 20px #ffeb3b88; } to { box-shadow: 0 0 40px #ffeb3b; } }

    .msg {
      margin: 24px 0;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      text-align: center;
      min-height: 2.2rem;
      color: var(--gold2);
    }
    .msg.win { color: var(--gold); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }

    .controls {
      margin: 20px 0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--gold2), var(--gold));
      border: 1px solid var(--goldd);
      color: #1a1408;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
    .btn-secondary {
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold2);
    }
    .btn-secondary:hover { background: rgba(201,168,76,0.22); }

    @media (max-width: 500px) {
      h1 { font-size: 2.6rem; }
      #grid { gap: 8px; padding: 10px; }
      .tile { font-size: 2rem; }
      .tile-128, .tile-256, .tile-512 { font-size: 1.8rem; }
      .tile-1024, .tile-2048 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>2048</h1>
    <div class="subtitle">LuJEUX</div>
  </header>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Meilleur</div>
      <div class="stat-value" id="best">0</div>
    </div>
  </div>

  <div id="game-container">
    <div id="grid"></div>
  </div>

  <div class="msg" id="message"></div>

  <div class="controls">
    <button class="btn-primary" onclick="resetGame()">Nouvelle partie</button>
    <button class="btn-secondary" onclick="undo()">Annuler (1 coup)</button>
  </div>

  <script>
    const SIZE = 4;
    let grid = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
    let score = 0;
    let best = localStorage.getItem('2048_best') || 0;
    let prevState = null;
    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const msgEl   = document.getElementById('message');

    bestEl.textContent = best;

    function init() {
      grid = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
      score = 0;
      scoreEl.textContent = 0;
      msgEl.textContent = '';
      addRandomTile();
      addRandomTile();
      render();
      prevState = null;
    }

    function render() {
      gridEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = grid[r][c];
          const cell = document.createElement('div');
          cell.className = 'cell';
          if (val > 0) {
            const tile = document.createElement('div');
            tile.className = `tile tile-${val}`;
            tile.textContent = val;
            cell.appendChild(tile);
          }
          gridEl.appendChild(cell);
        }
      }
    }

    function addRandomTile() {
      const empty = [];
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] === 0) empty.push([r,c]);
      if (empty.length === 0) return;
      const [r,c] = empty[Math.floor(Math.random()*empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function slideRow(row) {
      let newRow = row.filter(v=>v!==0);
      for (let i = 0; i < newRow.length-1; i++) {
        if (newRow[i] === newRow[i+1]) {
          newRow[i] *= 2;
          score += newRow[i];
          newRow.splice(i+1,1);
          i--;
        }
      }
      while (newRow.length < SIZE) newRow.push(0);
      return newRow;
    }

    function move(direction) {
      let moved = false;
      const oldGrid = grid.map(row=>[...row]);

      if (direction === 'left') {
        for (let r = 0; r < SIZE; r++) {
          const newR = slideRow(grid[r]);
          if (newR.join() !== grid[r].join()) moved = true;
          grid[r] = newR;
        }
      }
      else if (direction === 'right') {
        for (let r = 0; r < SIZE; r++) {
          const rev = slideRow(grid[r].reverse()).reverse();
          if (rev.join() !== grid[r].join()) moved = true;
          grid[r] = rev;
        }
      }
      else if (direction === 'up') {
        for (let c = 0; c < SIZE; c++) {
          let col = [grid[0][c],grid[1][c],grid[2][c],grid[3][c]];
          const newC = slideRow(col);
          if (newC.join() !== col.join()) moved = true;
          for (let r = 0; r < SIZE; r++) grid[r][c] = newC[r];
        }
      }
      else if (direction === 'down') {
        for (let c = 0; c < SIZE; c++) {
          let col = [grid[0][c],grid[1][c],grid[2][c],grid[3][c]].reverse();
          const newC = slideRow(col).reverse();
          if (newC.join() !== [grid[0][c],grid[1][c],grid[2][c],grid[3][c]].join()) moved = true;
          for (let r = 0; r < SIZE; r++) grid[r][c] = newC[r];
        }
      }

      if (moved) {
        prevState = { grid: oldGrid.map(r=>[...r]), score };
        addRandomTile();
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('2048_best', best);
        }
        render();

        if (has2048()) {
          msgEl.textContent = "2048 atteint ! Victoire ! ✦";
          msgEl.className = "msg win";
        }
        else if (isGameOver()) {
          msgEl.textContent = "Plus de mouvements possibles… Game Over";
        }
      }
    }

    function has2048() {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] === 2048) return true;
      return false;
    }

    function isGameOver() {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] === 0) return false;
      // Vérifier fusions possibles
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE-1; c++)
          if (grid[r][c] === grid[r][c+1]) return false;
      }
      for (let c = 0; c < SIZE; c++) {
        for (let r = 0; r < SIZE-1; r++)
          if (grid[r][c] === grid[r+1][c]) return false;
      }
      return true;
    }

    function undo() {
      if (!prevState) return;
      grid = prevState.grid.map(r=>[...r]);
      score = prevState.score;
      scoreEl.textContent = score;
      prevState = null;
      render();
      msgEl.textContent = '';
    }

    function resetGame() {
      init();
    }

    // Contrôles clavier
    window.addEventListener('keydown', e => {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
        e.preventDefault();
        const dir = e.key.replace('Arrow','').toLowerCase();
        move(dir);
      }
    });

    // Swipe mobile (optionnel mais sympa)
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    document.addEventListener('touchend', e => {
      if (!touchStartX || !touchStartY) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        move(dx > 0 ? 'right' : 'left');
      } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 40) {
        move(dy > 0 ? 'down' : 'up');
      }
      touchStartX = touchStartY = 0;
    });

    // Démarrage
    init();
  </script>
</body>
</html>
