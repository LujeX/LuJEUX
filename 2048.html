<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2048 ULTIMATE | Neon Arcade</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

:root{
  --neon-gold:#ffd700;--neon-cyan:#00ffff;--neon-pink:#ff00ff;--neon-green:#00ff88;
  --neon-red:#ff3366;--neon-blue:#3366ff;--neon-purple:#8b2be2;
  --bg-deep:#0a0a0f;--bg-card:rgba(20,20,30,0.8);
  --tile-2:#00bcd4;--tile-4:#0097a7;--tile-8:#ff5722;--tile-16:#ff9800;
  --tile-32:#ffeb3b;--tile-64:#8bc34a;--tile-128:#4caf50;--tile-256:#2196f3;
  --tile-512:#3f51b5;--tile-1024:#9c27b0;--tile-2048:#ff4081;--tile-4096:#e91e63;
  --tile-8192:#9c27b0;--tile-16384:#673ab7;--tile-32768:#3f51b5;--tile-65536:#2196f3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg-deep);
  color:#fff;
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
  min-height:100vh;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* FOND COSMIQUE */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:
    radial-gradient(circle at 20% 30%,rgba(255,215,0,0.05) 0%,transparent 50%),
    radial-gradient(circle at 80% 70%,rgba(0,255,255,0.05) 0%,transparent 50%),
    radial-gradient(circle at 40% 80%,rgba(255,0,255,0.05) 0%,transparent 50%);
  z-index:-2;
}

/* PARTICULES */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* HEADER */
.neon-header{
  position:relative;
  z-index:1;
  text-align:center;
  padding:40px 20px 30px;
  width:100%;
  max-width:800px;
}

.neon-title{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(2.5rem,8vw,4.5rem);
  font-weight:900;
  line-height:1;
  letter-spacing:2px;
  background:linear-gradient(135deg,#ffd700,#00ffff,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:0 0 20px rgba(255,215,0,0.5);
  margin-bottom:15px;
  animation:titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}

.neon-subtitle{
  font-family:'Orbitron',sans-serif;
  font-size:1rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--neon-cyan);
  margin-bottom:20px;
}

.back-btn{
  position:absolute;
  left:20px;
  top:20px;
  color:var(--neon-gold);
  text-decoration:none;
  font-size:0.9rem;
  display:flex;
  align-items:center;
  gap:8px;
  transition:all 0.3s;
  z-index:10;
}

.back-btn:hover{
  color:var(--neon-cyan);
  transform:translateX(-5px);
}

/* STATS */
.stats-container{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:0 20px 30px;
  max-width:800px;
  width:100%;
}

.stat-card{
  background:var(--bg-card);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:all 0.4s;
  position:relative;
  overflow:hidden;
}

.stat-card:hover{
  transform:translateY(-5px);
  border-color:var(--neon-gold);
  box-shadow:0 15px 30px rgba(0,0,0,0.4),
             0 0 20px rgba(255,215,0,0.3);
}

.stat-icon{
  font-size:2rem;
  margin-bottom:10px;
  color:var(--neon-gold);
}

.stat-number{
  font-family:'Orbitron',sans-serif;
  font-size:2.5rem;
  font-weight:900;
  color:var(--neon-gold);
  line-height:1;
  margin-bottom:5px;
}

.stat-label{
  font-size:0.8rem;
  color:var(--neon-cyan);
  text-transform:uppercase;
  letter-spacing:1.5px;
}

/* GRILLE DE JEU */
.game-container{
  position:relative;
  z-index:1;
  margin:20px 0;
  max-width:600px;
  width:100%;
}

.grid-container{
  background:var(--bg-card);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:25px;
  border:3px solid rgba(0,255,255,0.2);
  box-shadow:
    0 0 40px rgba(0,0,0,0.8),
    0 0 60px rgba(0,255,255,0.2),
    inset 0 0 30px rgba(0,255,255,0.1);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin:0 auto;
  position:relative;
}

.cell{
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
}

.cell::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 50%);
  border-radius:15px;
}

.cell:hover::before{
  background:linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 50%);
}

/* TUILE */
.tile{
  position:absolute;
  width:100px;
  height:100px;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-size:2rem;
  font-weight:900;
  transition:all 0.15s ease-out;
  z-index:2;
  box-shadow:
    0 5px 15px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2);
  user-select:none;
  animation:tileAppear 0.3s ease-out;
}

@keyframes tileAppear{
  0%{transform:scale(0);opacity:0;}
  70%{transform:scale(1.1);opacity:1;}
  100%{transform:scale(1);opacity:1;}
}

/* COULEURS DES TUILES AVEC EFFETS NÉON */
.tile-2{background:var(--tile-2);color:white;text-shadow:0 0 10px rgba(0,188,212,0.5);}
.tile-4{background:var(--tile-4);color:white;text-shadow:0 0 10px rgba(0,151,167,0.5);}
.tile-8{background:var(--tile-8);color:white;text-shadow:0 0 10px rgba(255,87,34,0.5);}
.tile-16{background:var(--tile-16);color:white;text-shadow:0 0 10px rgba(255,152,0,0.5);}
.tile-32{background:var(--tile-32);color:#333;text-shadow:0 0 10px rgba(255,235,59,0.5);}
.tile-64{background:var(--tile-64);color:#333;text-shadow:0 0 10px rgba(139,195,74,0.5);}
.tile-128{background:var(--tile-128);color:white;font-size:1.8rem;text-shadow:0 0 15px rgba(76,175,80,0.6);}
.tile-256{background:var(--tile-256);color:white;font-size:1.8rem;text-shadow:0 0 15px rgba(33,150,243,0.6);}
.tile-512{background:var(--tile-512);color:white;font-size:1.6rem;text-shadow:0 0 15px rgba(63,81,181,0.6);}
.tile-1024{background:var(--tile-1024);color:white;font-size:1.4rem;text-shadow:0 0 20px rgba(156,39,176,0.7);}
.tile-2048{background:var(--tile-2048);color:white;font-size:1.4rem;text-shadow:0 0 20px rgba(255,64,129,0.7);}
.tile-4096{background:var(--tile-4096);color:white;font-size:1.3rem;text-shadow:0 0 25px rgba(233,30,99,0.8);}
.tile-8192{background:var(--tile-8192);color:white;font-size:1.2rem;text-shadow:0 0 25px rgba(156,39,176,0.8);}

.tile-2048{
  animation:victoryPulse 2s infinite alternate;
  box-shadow:
    0 0 20px var(--tile-2048),
    0 0 40px rgba(255,64,129,0.5),
    inset 0 1px 0 rgba(255,255,255,0.3);
}

@keyframes victoryPulse{
  0%{transform:scale(1);box-shadow:0 0 20px var(--tile-2048);}
  100%{transform:scale(1.05);box-shadow:0 0 40px var(--tile-2048),0 0 60px rgba(255,64,129,0.7);}
}

.tile-new{
  animation:newTile 0.3s ease-out;
}

@keyframes newTile{
  0%{transform:scale(0) rotate(0deg);}
  50%{transform:scale(1.2) rotate(180deg);}
  100%{transform:scale(1) rotate(360deg);}
}

.tile-merge{
  animation:mergeTile 0.4s ease-out;
}

@keyframes mergeTile{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

/* MESSAGE */
.message-container{
  position:relative;
  z-index:1;
  text-align:center;
  padding:20px;
  margin:20px auto;
  max-width:600px;
}

.message-content{
  background:rgba(0,0,0,0.5);
  padding:20px 40px;
  border-radius:50px;
  border:2px solid var(--neon-gold);
  color:var(--neon-gold);
  font-size:1.2rem;
  font-weight:600;
  letter-spacing:1px;
  animation:pulse 2s infinite alternate;
  font-family:'Orbitron',sans-serif;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(255,215,0,0.3);}
  100%{box-shadow:0 0 30px rgba(255,215,0,0.7);}
}

/* CONTROLS */
.controls-container{
  position:relative;
  z-index:1;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
  max-width:600px;
  margin:0 auto;
}

.btn-neon{
  padding:15px 30px;
  border:none;
  border-radius:50px;
  font-family:'Orbitron',sans-serif;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  gap:10px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.btn-primary{
  background:linear-gradient(135deg,#ffd700,#ffaa00);
  color:#000;
}

.btn-primary:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(255,215,0,0.4);
}

.btn-secondary{
  background:rgba(255,255,255,0.1);
  color:var(--neon-cyan);
  border:1px solid rgba(0,255,255,0.3);
}

.btn-secondary:hover{
  background:rgba(0,255,255,0.1);
  transform:translateY(-3px);
}

.btn-danger{
  background:rgba(255,51,102,0.2);
  color:var(--neon-red);
  border:1px solid rgba(255,51,102,0.3);
}

.btn-danger:hover{
  background:rgba(255,51,102,0.3);
  transform:translateY(-3px);
}

/* ACHIEVEMENTS */
.achievements-container{
  position:relative;
  z-index:1;
  max-width:600px;
  margin:30px auto;
  padding:0 20px;
}

.achievements-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}

.achievement-card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:15px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
  transition:all 0.3s;
  opacity:0.5;
}

.achievement-card.unlocked{
  opacity:1;
  border-color:var(--neon-gold);
  box-shadow:0 0 20px rgba(255,215,0,0.3);
}

.achievement-icon{
  font-size:2rem;
  margin-bottom:10px;
  color:var(--neon-gold);
}

.achievement-name{
  font-family:'Orbitron',sans-serif;
  font-size:0.8rem;
  color:var(--neon-gold);
  margin-bottom:5px;
}

.achievement-desc{
  font-size:0.7rem;
  color:#aaa;
}

/* PARTICLES EFFECT */
.particles-effect{
  position:absolute;
  pointer-events:none;
  z-index:3;
}

.particle{
  position:absolute;
  width:8px;
  height:8px;
  border-radius:50%;
  pointer-events:none;
  animation:particleFloat 1s ease-out forwards;
}

@keyframes particleFloat{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}

/* RESPONSIVE */
@media(max-width:768px){
  .grid-container{padding:15px;}
  .cell{width:70px;height:70px;}
  .tile{width:70px;height:70px;font-size:1.5rem;}
  .tile-128,.tile-256{font-size:1.3rem;}
  .tile-512,.tile-1024{font-size:1.2rem;}
  .tile-2048{font-size:1.1rem;}
  .stats-container{grid-template-columns:repeat(2,1fr);}
  .controls-container{flex-direction:column;align-items:center;}
  .btn-neon{width:100%;max-width:300px;justify-content:center;}
}

@media(max-width:480px){
  .stats-container{grid-template-columns:1fr;}
  .cell{width:60px;height:60px;}
  .tile{width:60px;height:60px;font-size:1.3rem;}
  .tile-128,.tile-256{font-size:1.1rem;}
  .tile-512,.tile-1024{font-size:1rem;}
  .tile-2048{font-size:0.9rem;}
  .neon-title{font-size:2rem;}
  .neon-subtitle{font-size:0.8rem;letter-spacing:2px;}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);}
::-webkit-scrollbar-thumb{background:linear-gradient(135deg,#ffd700,#00ffff);border-radius:5px;}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(135deg,#00ffff,#ff00ff);}
</style>
</head>
<body>
<!-- Particules -->
<div id="particles-js"></div>

<!-- Header -->
<div class="neon-header">
  <a href="index.html" class="back-btn">
    <i class="fas fa-arrow-left"></i> RETOUR
  </a>
  <h1 class="neon-title">2048 ULTIMATE</h1>
  <div class="neon-subtitle">FUSIONNEZ JUSQU'À L'INFINI</div>
</div>

<!-- Stats -->
<div class="stats-container">
  <div class="stat-card">
    <div class="stat-icon"><i class="fas fa-star"></i></div>
    <div class="stat-number" id="score">0</div>
    <div class="stat-label">Score</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fas fa-trophy"></i></div>
    <div class="stat-number" id="best">0</div>
    <div class="stat-label">Meilleur Score</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fas fa-bolt"></i></div>
    <div class="stat-number" id="moves">0</div>
    <div class="stat-label">Mouvements</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon"><i class="fas fa-chess-board"></i></div>
    <div class="stat-number" id="tiles">2</div>
    <div class="stat-label">Tuiles Actives</div>
  </div>
</div>

<!-- Grille de jeu -->
<div class="game-container">
  <div class="grid-container">
    <div class="grid" id="grid">
      <!-- Généré dynamiquement -->
    </div>
  </div>
</div>

<!-- Message -->
<div class="message-container">
  <div class="message-content" id="message">
    <i class="fas fa-gamepad"></i> UTILISEZ LES FLÈCHES POUR JOUER
  </div>
</div>

<!-- Contrôles -->
<div class="controls-container">
  <button class="btn-neon btn-primary" onclick="resetGame()">
    <i class="fas fa-redo"></i> NOUVELLE PARTIE
  </button>
  <button class="btn-neon btn-secondary" onclick="undoMove()">
    <i class="fas fa-undo"></i> ANNULER
  </button>
  <button class="btn-neon btn-secondary" onclick="toggleTheme()">
    <i class="fas fa-palette"></i> THÈME NÉON
  </button>
  <button class="btn-neon btn-danger" onclick="showHint()">
    <i class="fas fa-lightbulb"></i> ASTUCE
  </button>
</div>

<!-- Achievements -->
<div class="achievements-container">
  <h3 style="color:var(--neon-gold);text-align:center;margin-bottom:20px;font-family:'Orbitron',sans-serif;">
    <i class="fas fa-trophy"></i> SUCCÈS DÉBLOQUÉS
  </h3>
  <div class="achievements-grid">
    <div class="achievement-card" id="ach-64">
      <div class="achievement-icon"><i class="fas fa-chess-pawn"></i></div>
      <div class="achievement-name">64</div>
      <div class="achievement-desc">Atteindre 64</div>
    </div>
    <div class="achievement-card" id="ach-256">
      <div class="achievement-icon"><i class="fas fa-chess-knight"></i></div>
      <div class="achievement-name">256</div>
      <div class="achievement-desc">Atteindre 256</div>
    </div>
    <div class="achievement-card" id="ach-1024">
      <div class="achievement-icon"><i class="fas fa-chess-queen"></i></div>
      <div class="achievement-name">1024</div>
      <div class="achievement-desc">Atteindre 1024</div>
    </div>
    <div class="achievement-card" id="ach-2048">
      <div class="achievement-icon"><i class="fas fa-crown"></i></div>
      <div class="achievement-name">2048</div>
      <div class="achievement-desc">VICTOIRE !</div>
    </div>
  </div>
</div>

<!-- Zone pour les effets de particules -->
<div id="particles-effect" class="particles-effect"></div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
// ===== INITIALISATION PARTICULES =====
particlesJS("particles-js", {
  particles: {
    number: { value: 50, density: { enable: true, value_area: 800 } },
    color: { value: "#ffd700" },
    shape: { type: "circle" },
    opacity: { value: 0.5, random: true },
    size: { value: 3, random: true },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#00ffff",
      opacity: 0.2,
      width: 1
    },
    move: {
      enable: true,
      speed: 2,
      direction: "none",
      random: true,
      straight: false,
      out_mode: "out",
      bounce: false
    }
  },
  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: { enable: true, mode: "repulse" },
      onclick: { enable: true, mode: "push" }
    }
  }
});

// ===== CONFIGURATION DU JEU =====
const GRID_SIZE = 4;
let grid = [];
let score = 0;
let bestScore = localStorage.getItem('2048-best') || 0;
let moves = 0;
let gameOver = false;
let previousState = null;
let achievements = {
  64: false,
  256: false,
  1024: false,
  2048: false
};

// Éléments DOM
const gridElement = document.getElementById('grid');
const scoreElement = document.getElementById('score');
const bestElement = document.getElementById('best');
const movesElement = document.getElementById('moves');
const tilesElement = document.getElementById('tiles');
const messageElement = document.getElementById('message');
const particlesEffect = document.getElementById('particles-effect');

// ===== INITIALISATION =====
function init() {
  // Créer la grille vide
  grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
  
  // Réinitialiser les valeurs
  score = 0;
  moves = 0;
  gameOver = false;
  previousState = null;
  
  // Mettre à jour l'affichage
  updateDisplay();
  
  // Cacher le message
  hideMessage();
  
  // Générer la grille HTML
  renderGrid();
  
  // Ajouter 2 tuiles initiales
  addRandomTile();
  addRandomTile();
  
  // Mettre à jour le compteur de tuiles
  updateTilesCount();
  
  // Charger les succès
  loadAchievements();
}

// ===== RENDU DE LA GRILLE =====
function renderGrid() {
  gridElement.innerHTML = '';
  
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = row;
      cell.dataset.col = col;
      
      // Ajouter la tuile si elle existe
      const value = grid[row][col];
      if (value > 0) {
        const tile = document.createElement('div');
        tile.className = `tile tile-${value}`;
        tile.textContent = value;
        tile.dataset.value = value;
        
        // Animation pour les nouvelles tuiles
        if (isNewTile(row, col)) {
          tile.classList.add('tile-new');
          setTimeout(() => tile.classList.remove('tile-new'), 300);
        }
        
        cell.appendChild(tile);
      }
      
      gridElement.appendChild(cell);
    }
  }
}

function isNewTile(row, col) {
  // Cette fonction devrait vérifier si la tuile est nouvelle
  // Pour simplifier, on considère qu'elles sont toutes nouvelles au rendu initial
  return true;
}

// ===== AJOUTER UNE TUILE ALÉATOIRE =====
function addRandomTile() {
  // Trouver toutes les cellules vides
  const emptyCells = [];
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      if (grid[row][col] === 0) {
        emptyCells.push({ row, col });
      }
    }
  }
  
  // Si pas de cellules vides, retourner
  if (emptyCells.length === 0) return;
  
  // Choisir une cellule aléatoire
  const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
  
  // 90% de chance d'avoir un 2, 10% un 4
  grid[row][col] = Math.random() < 0.9 ? 2 : 4;
  
  // Effet de particules
  createParticleEffect(col * 115 + 57.5, row * 115 + 57.5, grid[row][col]);
}

// ===== MOUVEMENTS =====
function move(direction) {
  if (gameOver) return;
  
  // Sauvegarder l'état précédent
  saveState();
  
  let moved = false;
  
  // Copie de la grille pour comparaison
  const oldGrid = grid.map(row => [...row]);
  
  // Déplacer selon la direction
  switch(direction) {
    case 'left':
      for (let row = 0; row < GRID_SIZE; row++) {
        const newRow = slideAndMerge(grid[row]);
        if (newRow.join() !== grid[row].join()) moved = true;
        grid[row] = newRow;
      }
      break;
      
    case 'right':
      for (let row = 0; row < GRID_SIZE; row++) {
        const reversed = [...grid[row]].reverse();
        const newRow = slideAndMerge(reversed).reverse();
        if (newRow.join() !== grid[row].join()) moved = true;
        grid[row] = newRow;
      }
      break;
      
    case 'up':
      for (let col = 0; col < GRID_SIZE; col++) {
        const column = [];
        for (let row = 0; row < GRID_SIZE; row++) {
          column.push(grid[row][col]);
        }
        const newColumn = slideAndMerge(column);
        for (let row = 0; row < GRID_SIZE; row++) {
          if (grid[row][col] !== newColumn[row]) moved = true;
          grid[row][col] = newColumn[row];
        }
      }
      break;
      
    case 'down':
      for (let col = 0; col < GRID_SIZE; col++) {
        const column = [];
        for (let row = GRID_SIZE - 1; row >= 0; row--) {
          column.push(grid[row][col]);
        }
        const newColumn = slideAndMerge(column);
        for (let row = 0; row < GRID_SIZE; row++) {
          if (grid[GRID_SIZE - 1 - row][col] !== newColumn[row]) moved = true;
          grid[GRID_SIZE - 1 - row][col] = newColumn[row];
        }
      }
      break;
  }
  
  // Si un mouvement a eu lieu
  if (moved) {
    moves++;
    
    // Ajouter une nouvelle tuile
    addRandomTile();
    
    // Mettre à jour l'affichage
    renderGrid();
    updateDisplay();
    updateTilesCount();
    
    // Vérifier les succès
    checkAchievements();
    
    // Vérifier la victoire
    if (checkWin()) {
      showMessage("🎉 VICTOIRE ULTIME ! Vous avez atteint 2048 !", "victory");
      gameOver = true;
      unlockAchievement(2048);
    }
    // Vérifier la défaite
    else if (checkGameOver()) {
      showMessage("💀 GAME OVER ! Plus de mouvements possibles.", "gameover");
      gameOver = true;
    }
  } else {
    showMessage("⚠️ Mouvement impossible !", "warning", 1000);
  }
}

// ===== FONCTION DE FUSION =====
function slideAndMerge(line) {
  // Filtrer les zéros
  let filtered = line.filter(val => val !== 0);
  let merged = false;
  
  // Fusionner les tuiles identiques
  for (let i = 0; i < filtered.length - 1; i++) {
    if (filtered[i] === filtered[i + 1]) {
      filtered[i] *= 2;
      score += filtered[i];
      filtered.splice(i + 1, 1);
      merged = true;
      
      // Animation de fusion
      setTimeout(() => {
        const tiles = document.querySelectorAll('.tile');
        tiles.forEach(tile => {
          if (parseInt(tile.textContent) === filtered[i]) {
            tile.classList.add('tile-merge');
            setTimeout(() => tile.classList.remove('tile-merge'), 400);
          }
        });
      }, 100);
    }
  }
  
  // Remplir avec des zéros
  while (filtered.length < GRID_SIZE) {
    filtered.push(0);
  }
  
  return filtered;
}

// ===== VÉRIFICATIONS =====
function checkWin() {
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      if (grid[row][col] === 2048) {
        return true;
      }
    }
  }
  return false;
}

function checkGameOver() {
  // Vérifier s'il reste des cases vides
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      if (grid[row][col] === 0) {
        return false;
      }
    }
  }
  
  // Vérifier les fusions possibles
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE - 1; col++) {
      if (grid[row][col] === grid[row][col + 1]) {
        return false;
      }
    }
  }
  
  for (let col = 0; col < GRID_SIZE; col++) {
    for (let row = 0; row < GRID_SIZE - 1; row++) {
      if (grid[row][col] === grid[row + 1][col]) {
        return false;
      }
    }
  }
  
  return true;
}

// ===== GESTION DU SCORE =====
function updateDisplay() {
  scoreElement.textContent = score;
  movesElement.textContent = moves;
  
  // Mettre à jour le meilleur score
  if (score > bestScore) {
    bestScore = score;
    bestElement.textContent = bestScore;
    localStorage.setItem('2048-best', bestScore);
    
    // Animation pour le nouveau record
    bestElement.style.transform = 'scale(1.2)';
    bestElement.style.color = 'var(--neon-pink)';
    setTimeout(() => {
      bestElement.style.transform = 'scale(1)';
      bestElement.style.color = 'var(--neon-gold)';
    }, 500);
  }
}

function updateTilesCount() {
  let count = 0;
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      if (grid[row][col] > 0) count++;
    }
  }
  tilesElement.textContent = count;
}

// ===== SUCCÈS =====
function checkAchievements() {
  let maxTile = 0;
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      if (grid[row][col] > maxTile) {
        maxTile = grid[row][col];
      }
    }
  }
  
  if (maxTile >= 64 && !achievements[64]) unlockAchievement(64);
  if (maxTile >= 256 && !achievements[256]) unlockAchievement(256);
  if (maxTile >= 1024 && !achievements[1024]) unlockAchievement(1024);
  if (maxTile >= 2048 && !achievements[2048]) unlockAchievement(2048);
}

function unlockAchievement(value) {
  achievements[value] = true;
  const achievementElement = document.getElementById(`ach-${value}`);
  if (achievementElement) {
    achievementElement.classList.add('unlocked');
    
    // Effet de célébration
    createParticleEffect(
      achievementElement.offsetLeft + achievementElement.offsetWidth / 2,
      achievementElement.offsetTop + achievementElement.offsetHeight / 2,
      value
    );
    
    showMessage(`🏆 Succès débloqué : ${value} !`, "achievement", 2000);
  }
  
  saveAchievements();
}

function loadAchievements() {
  const saved = localStorage.getItem('2048-achievements');
  if (saved) {
    achievements = { ...achievements, ...JSON.parse(saved) };
    Object.keys(achievements).forEach(value => {
      if (achievements[value]) {
        const element = document.getElementById(`ach-${value}`);
        if (element) element.classList.add('unlocked');
      }
    });
  }
}

function saveAchievements() {
  localStorage.setItem('2048-achievements', JSON.stringify(achievements));
}

// ===== SAUVEGARDE D'ÉTAT =====
function saveState() {
  previousState = {
    grid: grid.map(row => [...row]),
    score: score,
    moves: moves
  };
}

function undoMove() {
  if (!previousState || gameOver) return;
  
  grid = previousState.grid.map(row => [...row]);
  score = previousState.score;
  moves = previousState.moves;
  previousState = null;
  
  updateDisplay();
  renderGrid();
  updateTilesCount();
  hideMessage();
  gameOver = false;
}

// ===== EFFETS VISUELS =====
function createParticleEffect(x, y, value) {
  const colors = {
    2: '#00bcd4', 4: '#0097a7', 8: '#ff5722', 16: '#ff9800',
    32: '#ffeb3b', 64: '#8bc34a', 128: '#4caf50', 256: '#2196f3',
    512: '#3f51b5', 1024: '#9c27b0', 2048: '#ff4081'
  };
  
  const color = colors[value] || '#ffffff';
  
  for (let i = 0; i < 12; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.cssText = `
      background: ${color};
      left: ${x}px;
      top: ${y}px;
      --tx: ${(Math.random() - 0.5) * 100}px;
      --ty: ${(Math.random() - 0.5) * 100}px;
    `;
    
    particlesEffect.appendChild(particle);
    
    setTimeout(() => {
      particle.remove();
    }, 1000);
  }
}

// ===== MESSAGES =====
function showMessage(text, type = 'info', duration = 3000) {
  messageElement.innerHTML = text;
  messageElement.style.display = 'block';
  
  // Couleur selon le type
  const colors = {
    victory: '#00ff88',
    gameover: '#ff3366',
    achievement: '#ffd700',
    warning: '#ff9800',
    info: '#00ffff'
  };
  
  messageElement.style.borderColor = colors[type] || colors.info;
  messageElement.style.color = colors[type] || colors.info;
  
  // Cacher après la durée spécifiée
  if (duration > 0) {
    setTimeout(hideMessage, duration);
  }
}

function hideMessage() {
  messageElement.style.display = 'none';
}

// ===== FONCTIONS UTILITAIRES =====
function resetGame() {
  init();
  showMessage('🔄 Nouvelle partie ! Bonne chance !', 'info', 2000);
}

function toggleTheme() {
  document.body.classList.toggle('dark-theme');
  showMessage('🎨 Thème changé !', 'info', 1000);
}

function showHint() {
  const hints = [
    "💡 Gardez votre plus grande tuile dans un coin !",
    "💡 Essayez de maintenir les tuiles dans l'ordre décroissant",
    "💡 Utilisez les coins pour maximiser vos fusions",
    "💡 Ne remplissez pas une ligne si vous pouvez l'éviter"
  ];
  showMessage(hints[Math.floor(Math.random() * hints.length)], 'info', 3000);
}

// ===== CONTRÔLES =====
document.addEventListener('keydown', (e) => {
  if (gameOver && e.key !== 'Enter') return;
  
  switch(e.key) {
    case 'ArrowUp':
      e.preventDefault();
      move('up');
      break;
    case 'ArrowDown':
      e.preventDefault();
      move('down');
      break;
    case 'ArrowLeft':
      e.preventDefault();
      move('left');
      break;
    case 'ArrowRight':
      e.preventDefault();
      move('right');
      break;
    case 'r':
    case 'R':
      resetGame();
      break;
    case 'u':
    case 'U':
      undoMove();
      break;
    case 'h':
    case 'H':
      showHint();
      break;
  }
});

// Contrôles tactiles
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!touchStartX || !touchStartY) return;
  
  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;
  
  const dx = touchEndX - touchStartX;
  const dy = touchEndY - touchStartY;
  
  // Seuil de détection (40px)
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > 40) {
      move(dx > 0 ? 'right' : 'left');
    }
  } else {
    if (Math.abs(dy) > 40) {
      move(dy > 0 ? 'down' : 'up');
    }
  }
  
  touchStartX = 0;
  touchStartY = 0;
}, { passive: true });

// ===== INITIALISATION =====
window.addEventListener('load', () => {
  init();
  showMessage('🎮 Utilisez les flèches ou swipez pour jouer !', 'info', 3000);
  
  // Effet de frappe pour le titre
  const title = document.querySelector('.neon-title');
  const text = title.textContent;
  title.textContent = '';
  
  text.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.textContent = char;
    span.style.animationDelay = `${i * 0.05}s`;
    span.style.opacity = '0';
    span.style.animation = `fadeIn 0.3s forwards ${i * 0.05}s`;
    title.appendChild(span);
  });
  
  const style = document.createElement('style');
  style.textContent = `
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px) rotateX(90deg); }
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }
  `;
  document.head.appendChild(style);
});
</script>
