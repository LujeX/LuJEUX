<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 NEON | Neon Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffd700;
        }
        .back-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 18px;
        }
        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 150px;
        }
        .score {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
        }
        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 30px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #message {
            color: #00ffff;
            font-size: 20px;
            margin-bottom: 20px;
            min-height: 30px;
        }
        @media (max-width: 600px) {
            #grid {
                grid-template-columns: repeat(4, 70px);
                grid-template-rows: repeat(4, 70px);
                gap: 8px;
                padding: 15px;
            }
            .cell, .tile {
                width: 70px;
                height: 70px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Retour</a>
    
    <div class="header">
        <h1>2048 NEON</h1>
        <p style="color: #00ffff;">Fusionnez les tuiles pour atteindre 2048 !</p>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div>SCORE</div>
            <div class="score" id="score">0</div>
        </div>
        <div class="stat-box">
            <div>MEILLEUR</div>
            <div class="score" id="best">0</div>
        </div>
    </div>
    
    <div id="message">Utilisez les flèches du clavier</div>
    
    <div id="grid"></div>
    
    <div class="controls">
        <button onclick="resetGame()">Nouvelle Partie</button>
        <button onclick="undoMove()">Annuler</button>
    </div>

    <script>
        // Jeu 2048 complet
        const SIZE = 4;
        let grid = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        let score = 0;
        let best = localStorage.getItem('2048-best') || 0;
        let prevState = null;
        
        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const msgEl = document.getElementById('message');
        
        bestEl.textContent = best;
        
        function init() {
            grid = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
            score = 0;
            scoreEl.textContent = '0';
            msgEl.textContent = 'Utilisez les flèches du clavier';
            addRandomTile();
            addRandomTile();
            render();
            prevState = null;
        }
        
        function render() {
            gridEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const val = grid[r][c];
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (val > 0) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.textContent = val;
                        tile.style.background = getTileColor(val);
                        tile.style.color = val >= 32 ? '#333' : 'white';
                        cell.appendChild(tile);
                    }
                    gridEl.appendChild(cell);
                }
            }
        }
        
        function getTileColor(val) {
            const colors = {
                2: '#00bcd4', 4: '#0097a7', 8: '#ff5722', 16: '#ff9800',
                32: '#ffeb3b', 64: '#8bc34a', 128: '#4caf50', 256: '#2196f3',
                512: '#3f51b5', 1024: '#9c27b0', 2048: '#ff4081'
            };
            return colors[val] || '#666';
        }
        
        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) empty.push([r, c]);
                }
            }
            if (empty.length === 0) return;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }
        
        function slideRow(row) {
            let newRow = row.filter(v => v !== 0);
            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] === newRow[i + 1]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow.splice(i + 1, 1);
                    i--;
                }
            }
            while (newRow.length < SIZE) newRow.push(0);
            return newRow;
        }
        
        function move(direction) {
            let moved = false;
            const oldGrid = grid.map(row => [...row]);
            
            if (direction === 'left') {
                for (let r = 0; r < SIZE; r++) {
                    const newR = slideRow(grid[r]);
                    if (newR.join() !== grid[r].join()) moved = true;
                    grid[r] = newR;
                }
            } else if (direction === 'right') {
                for (let r = 0; r < SIZE; r++) {
                    const rev = slideRow(grid[r].reverse()).reverse();
                    if (rev.join() !== grid[r].join()) moved = true;
                    grid[r] = rev;
                }
            } else if (direction === 'up') {
                for (let c = 0; c < SIZE; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    const newC = slideRow(col);
                    if (newC.join() !== col.join()) moved = true;
                    for (let r = 0; r < SIZE; r++) grid[r][c] = newC[r];
                }
            } else if (direction === 'down') {
                for (let c = 0; c < SIZE; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]].reverse();
                    const newC = slideRow(col).reverse();
                    if (newC.join() !== [grid[0][c], grid[1][c], grid[2][c], grid[3][c]].join()) moved = true;
                    for (let r = 0; r < SIZE; r++) grid[r][c] = newC[r];
                }
            }
            
            if (moved) {
                prevState = { grid: oldGrid.map(r => [...r]), score };
                addRandomTile();
                scoreEl.textContent = score;
                if (score > best) {
                    best = score;
                    bestEl.textContent = best;
                    localStorage.setItem('2048-best', best);
                }
                render();
                
                if (has2048()) {
                    msgEl.textContent = "🎉 VICTOIRE ! Vous avez atteint 2048 !";
                } else if (isGameOver()) {
                    msgEl.textContent = "💀 GAME OVER ! Plus de mouvements possibles.";
                }
            }
        }
        
        function has2048() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 2048) return true;
                }
            }
            return false;
        }
        
        function isGameOver() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                }
            }
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE - 1; c++) {
                    if (grid[r][c] === grid[r][c + 1]) return false;
                }
            }
            for (let c = 0; c < SIZE; c++) {
                for (let r = 0; r < SIZE - 1; r++) {
                    if (grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }
        
        function undoMove() {
            if (!prevState) return;
            grid = prevState.grid.map(r => [...r]);
            score = prevState.score;
            scoreEl.textContent = score;
            prevState = null;
            render();
            msgEl.textContent = '';
        }
        
        function resetGame() {
            init();
        }
        
        // Contrôles clavier
        window.addEventListener('keydown', e => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
                const dir = e.key.replace('Arrow', '').toLowerCase();
                move(dir);
            }
        });
        
        // Contrôles tactiles
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
                move(dx > 0 ? 'right' : 'left');
            } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 40) {
                move(dy > 0 ? 'down' : 'up');
            }
            touchStartX = touchStartY = 0;
        });
        
        init();
    </script>
</body>
</html>
