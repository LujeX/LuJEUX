<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morpion Royal — LuJEUX</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap">
  <style>
    :root {
      --bg: #06080f;
      --gold: #c9a84c; --gold2: #e8cc7a; --goldd: #7a5c1a;
      --cell: rgba(201,168,76,0.08);
      --txt: #f5ecd5;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--txt);
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.5rem;
      color: var(--gold2);
      text-shadow: 0 0 20px rgba(201,168,76,0.5);
      margin: 20px 0;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 8px;
      margin: 20px 0;
    }
    .cell {
      width: 100px;
      height: 100px;
      background: var(--cell);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.2s;
    }
    .cell:hover { background: rgba(201,168,76,0.15); }
    .cell.x { color: #cc2233; }
    .cell.o { color: var(--gold2); }
    #status {
      font-size: 1.8rem;
      margin: 20px 0;
      min-height: 2.5rem;
      text-align: center;
    }
    button {
      padding: 12px 30px;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      background: linear-gradient(var(--gold2), var(--gold));
      border: none;
      border-radius: 8px;
      color: #1a1408;
      cursor: pointer;
    }
    @media (max-width: 500px) {
      #board { grid-template-columns: repeat(3, 80px); }
      .cell { width: 80px; height: 80px; font-size: 3.2rem; }
    }
  </style>
</head>
<body>
  <h1>Morpion Royal</h1>
  <div id="board"></div>
  <div id="status">À ton tour (X)</div>
  <button onclick="resetGame()">Rejouer</button>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    let currentPlayer = 'X';
    let gameBoard = Array(9).fill(null);
    let gameActive = true;

    function createCell(index) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.addEventListener('click', () => handleClick(index));
      return cell;
    }

    function initBoard() {
      board.innerHTML = '';
      gameBoard = Array(9).fill(null);
      for (let i = 0; i < 9; i++) {
        board.appendChild(createCell(i));
      }
      currentPlayer = 'X';
      status.textContent = "À ton tour (X)";
      gameActive = true;
    }

    function handleClick(index) {
      if (!gameActive || gameBoard[index]) return;
      gameBoard[index] = currentPlayer;
      board.children[index].textContent = currentPlayer;
      board.children[index].classList.add(currentPlayer.toLowerCase());

      if (checkWin()) {
        status.textContent = `Victoire ${currentPlayer} ! ✦`;
        gameActive = false;
        return;
      }
      if (gameBoard.every(cell => cell)) {
        status.textContent = "Égalité !";
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      status.textContent = `Tour de ${currentPlayer}`;
      if (currentPlayer === 'O') setTimeout(aiMove, 500);
    }

    function aiMove() {
      // Simple IA : bloque si possible, sinon random
      for (let i = 0; i < 9; i++) {
        if (!gameBoard[i]) {
          const temp = [...gameBoard];
          temp[i] = 'O';
          if (checkWinFor(temp, 'O')) return makeMove(i);
        }
      }
      for (let i = 0; i < 9; i++) {
        if (!gameBoard[i]) {
          const temp = [...gameBoard];
          temp[i] = 'X';
          if (checkWinFor(temp, 'X')) return makeMove(i);
        }
      }
      let empty = gameBoard.map((v,i) => v ? null : i).filter(v=>v!==null);
      makeMove(empty[Math.floor(Math.random()*empty.length)]);
    }

    function makeMove(index) {
      gameBoard[index] = 'O';
      board.children[index].textContent = 'O';
      board.children[index].classList.add('o');

      if (checkWin()) {
        status.textContent = "Victoire de l'IA (O) !";
        gameActive = false;
        return;
      }
      if (gameBoard.every(cell => cell)) {
        status.textContent = "Égalité !";
        gameActive = false;
        return;
      }
      currentPlayer = 'X';
      status.textContent = "À ton tour (X)";
    }

    function checkWin() {
      return checkWinFor(gameBoard, currentPlayer);
    }

    function checkWinFor(b, p) {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      return wins.some(combo => combo.every(i => b[i] === p));
    }

    function resetGame() {
      initBoard();
    }

    initBoard();
  </script>
</body>
</html>
